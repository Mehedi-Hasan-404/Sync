name: Build Kotlin Gecko Browser

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Android build tools
        run: |
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -f "$SDKMANAGER" ]; then
            SDKMANAGER="${ANDROID_HOME}/cmdline-tools/$(ls ${ANDROID_HOME}/cmdline-tools | sort -V | tail -1)/bin/sdkmanager"
          fi
          yes | "$SDKMANAGER" --licenses || true
          "$SDKMANAGER" "build-tools;35.0.0" "platforms;android-35" "ndk;27.2.12479018" "cmake;3.22.1"

      - name: Create Kotlin Gecko Browser project structure
        run: |
          mkdir -p KotlinGeckoBrowser
          cd KotlinGeckoBrowser

          # Root build.gradle.kts
          cat > build.gradle.kts << 'GRADLE'
          plugins {
              id("com.android.application") version "8.7.3" apply false
              id("org.jetbrains.kotlin.android") version "2.0.20" apply false
          }

          tasks.register("clean", Delete::class) {
              delete(layout.buildDirectory)
          }
          GRADLE

          # settings.gradle.kts
          cat > settings.gradle.kts << 'SETTINGS'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
                  maven { url = uri("https://maven.mozilla.org/maven2") }
              }
          }
          rootProject.name = "KotlinGeckoBrowser"
          include(":app")
          SETTINGS

          # gradle.properties
          cat > gradle.properties << 'PROPS'
          android.useAndroidX=true
          android.enableJetifier=false
          org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m
          kotlin.code.style=official
          PROPS

          mkdir -p app/src/main/kotlin/com/personal/geckobrowser
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/menu
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/assets/extensions
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi

          # Generate launcher icons via base64-encoded PNGs (blue circle, each density)
          echo "" | base64 -d > app/src/main/res/mipmap-mdpi/ic_launcher.png
          echo "" | base64 -d > app/src/main/res/mipmap-hdpi/ic_launcher.png
          echo "" | base64 -d > app/src/main/res/mipmap-xhdpi/ic_launcher.png
          echo "" | base64 -d > app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          echo "" | base64 -d > app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

          # app/build.gradle.kts
          cat > app/build.gradle.kts << 'APPGRADLE'
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }

          android {
              namespace = "com.personal.geckobrowser"
              compileSdk = 35

              defaultConfig {
                  applicationId = "com.personal.geckobrowser"
                  minSdk = 26
                  targetSdk = 35
                  versionCode = 1
                  versionName = "1.0"
                  externalNativeBuild {
                      cmake {
                          cppFlags("-std=c++17 -O2")
                          arguments("-DANDROID_STL=c++_shared")
                      }
                  }
              }

              buildTypes {
                  release {
                      isMinifyEnabled = false
                      proguardFiles(
                          getDefaultProguardFile("proguard-android-optimize.txt"),
                          "proguard-rules.pro"
                      )
                  }
              }

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = "17"
              }

              buildFeatures {
                  viewBinding = true
              }

              splits {
                  abi {
                      isEnable = true
                      reset()
                      include("arm64-v8a")
                      isUniversalApk = false
                  }
              }

              externalNativeBuild {
                  cmake {
                      path = file("src/main/cpp/CMakeLists.txt")
                      version = "3.22.1"
                  }
              }
          }

          dependencies {
              implementation("org.mozilla.geckoview:geckoview-omni:136.+")
              implementation("androidx.core:core-ktx:1.12.0")
              implementation("androidx.appcompat:appcompat:1.6.1")
              implementation("com.google.android.material:material:1.11.0")
              implementation("androidx.constraintlayout:constraintlayout:2.1.4")
              implementation("androidx.coordinatorlayout:coordinatorlayout:1.2.0")
              implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.7.0")
              implementation("androidx.recyclerview:recyclerview:1.3.2")
              implementation("androidx.documentfile:documentfile:1.0.1")
          }
          APPGRADLE

          # AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"
                  android:maxSdkVersion="32" />
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />
              <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"
                  android:maxSdkVersion="28" />
              <uses-permission android:name="android.permission.DOWNLOAD_WITHOUT_NOTIFICATION" />

              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="Personal Browser"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.GeckoBrowser"
                  android:hardwareAccelerated="true"
                  android:largeHeap="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:windowSoftInputMode="adjustResize"
                      android:configChanges="orientation|screenSize|keyboardHidden">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

                  <activity
                      android:name=".ExtensionManagerActivity"
                      android:exported="false"
                      android:label="Extension Manager" />

              </application>
          </manifest>
          MANIFEST

          # BaseActivity.kt — handles edge-to-edge window decor for all activities
          cat > app/src/main/kotlin/com/personal/geckobrowser/BaseActivity.kt << 'BASEKT'
          package com.personal.geckobrowser

          import android.os.Bundle
          import android.view.View
          import android.view.WindowInsets
          import androidx.appcompat.app.AppCompatActivity

          open class BaseActivity : AppCompatActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  window.setDecorFitsSystemWindows(false)
              }

              override fun onContentChanged() {
                  super.onContentChanged()
                  applyWindowInsets()
              }

              private fun applyWindowInsets() {
                  val root = findViewById<View>(android.R.id.content) ?: return
                  root.setOnApplyWindowInsetsListener { v, insets ->
                      val sys = insets.getInsets(WindowInsets.Type.systemBars())
                      v.setPadding(sys.left, sys.top, sys.right, 0)
                      // Let each activity adjust its own bottom padding via bottom_chrome or toolbar
                      val bottomBar = findViewById<View>(R.id.bottom_chrome)
                          ?: findViewById<View>(R.id.toolbar_ext)
                      bottomBar?.setPadding(0, 0, 0, sys.bottom)
                      insets
                  }
                  root.requestApplyInsets()
              }
          }
          BASEKT

          # MainActivity.kt
          cat > app/src/main/kotlin/com/personal/geckobrowser/MainActivity.kt << 'MAINKT'
          package com.personal.geckobrowser

          import android.content.Intent
          import android.net.Uri
          import android.os.Bundle
          import android.view.View
          import android.view.inputmethod.EditorInfo
          import android.widget.*
          import androidx.appcompat.app.AlertDialog
          import androidx.appcompat.app.AppCompatActivity
          import androidx.recyclerview.widget.LinearLayoutManager
          import androidx.recyclerview.widget.RecyclerView
          import org.mozilla.geckoview.*
          import org.mozilla.geckoview.GeckoSession.ProgressDelegate
          import org.mozilla.geckoview.GeckoSession.NavigationDelegate
          import org.mozilla.geckoview.GeckoSession.ContentDelegate
          import org.mozilla.geckoview.WebExtension.MessageDelegate
          import org.mozilla.geckoview.WebExtension.ActionDelegate
          import org.mozilla.geckoview.WebExtension.Action
          class MainActivity : BaseActivity() {
              companion object {
                  var appRuntime: GeckoRuntime? = null
                  var isDesktopMode = false
                  val MOBILE_UA = "Mozilla/5.0 (Android ${android.os.Build.VERSION.RELEASE}" +
                      "; Mobile; rv:137.0) Gecko/137.0 Firefox/137.0"
                  val DESKTOP_UA = "Mozilla/5.0 (X11; Linux x86_64; rv:137.0) Gecko/20100101 Firefox/137.0"
                  val GECKO_UA get() = if (isDesktopMode) DESKTOP_UA else MOBILE_UA
              }

              private lateinit var runtime: GeckoRuntime
              private lateinit var geckoView: GeckoView
              private lateinit var urlBar: EditText
              private lateinit var lockIcon: ImageView
              private lateinit var tabsContainer: RecyclerView
              private lateinit var tabAdapter: TabAdapter
              private lateinit var tabCountText: TextView
              private lateinit var btnBack: ImageButton
              private lateinit var btnForward: ImageButton
              private val tabs = mutableListOf<BrowserTab>()
              private var currentTabIndex = 0
              private lateinit var progressBar: android.widget.ProgressBar

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_main)

                  if (appRuntime == null) {
                      val settings = GeckoRuntimeSettings.Builder()
                          .extensionsProcessEnabled(true)
                          .build()
                      appRuntime = GeckoRuntime.create(this, settings)

                      // Auto-approve installs and updates
                      appRuntime!!.webExtensionController.promptDelegate =
                          object : WebExtensionController.PromptDelegate {
                              override fun onInstallPromptRequest(
                                  extension: WebExtension,
                                  permissions: Array<out String>,
                                  origins: Array<out String>
                              ): GeckoResult<WebExtension.PermissionPromptResponse> =
                                  GeckoResult.fromValue(
                                      WebExtension.PermissionPromptResponse(true, true))
                              override fun onUpdatePrompt(
                                  current: WebExtension,
                                  updated: WebExtension,
                                  newPermissions: Array<out String>,
                                  newOrigins: Array<out String>
                              ): GeckoResult<AllowOrDeny> = GeckoResult.fromValue(AllowOrDeny.ALLOW)
                          }

                  }
                  runtime = appRuntime!!

                  // Restore previously installed extensions on startup
                  runtime.webExtensionController.list().accept { extensions ->
                      extensions?.forEach { ext -> enableExtensionOnAllSessions(ext) }
                  }

                  // Install native crash handler and log ABI/device info
                  val crashLog = "${filesDir.absolutePath}/crash.log"
                  NativeBridge.installCrashHandler(crashLog)
                  android.util.Log.i("Browser", "ABI=${NativeBridge.getAbi()} " +
                      "RAM=${NativeBridge.getAvailableRamMb()}MB " +
                      "kernel=${NativeBridge.getKernelVersion()}")

                  geckoView     = findViewById(R.id.gecko_view)
                  urlBar        = findViewById(R.id.url_bar)
                  lockIcon      = findViewById(R.id.lock_icon)
                  tabsContainer = findViewById(R.id.tabs_recycler)
                  tabCountText  = findViewById(R.id.tab_count_text)
                  btnBack       = findViewById(R.id.btn_back)
                  btnForward    = findViewById(R.id.btn_forward)
                  progressBar   = findViewById(R.id.progress_bar)


                  setupTabs()
                  setupUrlBar()
                  setupButtons()
                  openNewTab("about:home")
              }

              private fun setupTabs() {
                  tabAdapter = TabAdapter(tabs,
                      onTabClick = { index -> switchToTab(index) },
                      onTabClose = { index -> closeTab(index) }
                  )
                  tabsContainer.layoutManager = LinearLayoutManager(this, LinearLayoutManager.HORIZONTAL, false)
                  tabsContainer.adapter = tabAdapter
              }

              private fun setupUrlBar() {
                  // Show full URL when focused for editing
                  urlBar.setOnFocusChangeListener { _, hasFocus ->
                      if (hasFocus) {
                          urlBar.setText(tabs.getOrNull(currentTabIndex)?.url ?: "")
                          urlBar.selectAll()
                      } else {
                          showDisplayUrl(tabs.getOrNull(currentTabIndex)?.url ?: "")
                      }
                  }
                  urlBar.setOnEditorActionListener { _, actionId, _ ->
                      if (actionId == EditorInfo.IME_ACTION_GO || actionId == EditorInfo.IME_ACTION_DONE) {
                          val input = urlBar.text.toString()
                          val imm = getSystemService(INPUT_METHOD_SERVICE) as android.view.inputmethod.InputMethodManager
                          imm.hideSoftInputFromWindow(urlBar.windowToken, 0)
                          urlBar.clearFocus()
                          loadUrl(input)
                          true
                      } else false
                  }
              }

              /** Shows domain (or search query) in the URL bar — Chrome style */
              private fun showDisplayUrl(url: String) {
                  if (url.isEmpty()) { urlBar.setText(""); return }
                  val display = try {
                      val uri = Uri.parse(url)
                      val host = uri.host
                      if (host != null) {
                          lockIcon.visibility = if (url.startsWith("https://")) View.VISIBLE else View.GONE
                          host.removePrefix("www.")
                      } else url
                  } catch (e: Exception) { url }
                  urlBar.setText(display)
              }

              private fun setupButtons() {
                  btnBack.setOnClickListener { tabs.getOrNull(currentTabIndex)?.session?.goBack() }
                  btnForward.setOnClickListener { tabs.getOrNull(currentTabIndex)?.session?.goForward() }
                  // Tab-switcher tap: show/hide strip; long-press: open new tab
                  val btnTabSwitcher = findViewById<FrameLayout>(R.id.btn_new_tab)
                  btnTabSwitcher.setOnClickListener { toggleTabStrip() }
                  btnTabSwitcher.setOnLongClickListener { openNewTab("about:home"); true }
                  findViewById<ImageButton>(R.id.btn_menu).setOnClickListener { v -> showBrowserMenu(v) }
              }

              private fun toggleTabStrip() {
                  val strip = tabsContainer
                  if (strip.visibility == View.VISIBLE) {
                      strip.visibility = View.GONE
                      strip.layoutParams.height = 0
                  } else {
                      strip.layoutParams.height = resources.getDimensionPixelSize(
                          android.R.dimen.app_icon_size).coerceAtMost(40.dpToPx())
                      strip.visibility = View.VISIBLE
                      tabAdapter.notifyDataSetChanged()
                  }
                  strip.requestLayout()
              }

              private fun Int.dpToPx() = (this * resources.displayMetrics.density).toInt()

              private fun updateNavButtons() {
                  btnBack.alpha = 0.4f
                  btnForward.alpha = 0.4f
              }

              private fun updateTabCount() {
                  tabCountText.text = tabs.size.coerceAtMost(99).toString()
              }

              // Called by TabDelegate when an extension opens a new tab
              private fun addExtensionTab(session: GeckoSession, url: String) {
                  setupSessionDelegates(session)
                  session.open(runtime)
                  val tab = BrowserTab(session, url)
                  tabs.add(tab)
                  tabAdapter.notifyItemInserted(tabs.size - 1)
                  switchToTab(tabs.size - 1)
                  updateTabCount()
                  session.loadUri(url)
              }

              // Wire ActionDelegate + MessageDelegate to a session for all installed extensions
              private fun enableExtensionOnAllSessions(ext: WebExtension) {
                  tabs.forEach { tab -> wireExtensionToSession(ext, tab.session) }
              }

              private fun wireExtensionToSession(ext: WebExtension, session: GeckoSession) {
                  // ActionDelegate — per-extension, handles badge/icon/popup clicks
                  // In GeckoView 136 setActionDelegate takes only the delegate (no session param)
                  ext.setActionDelegate(object : ActionDelegate {
                      override fun onBrowserAction(extension: WebExtension, s: GeckoSession?, action: Action) {
                          runOnUiThread { updateExtensionBadge(extension.id, action) }
                      }
                      override fun onTogglePopup(extension: WebExtension, action: Action): GeckoResult<GeckoSession>? {
                          val popupSession = GeckoSession()
                          runOnUiThread {
                              showExtensionPopup(extension, popupSession,
                                  action.title ?: extension.metaData?.name ?: "Extension")
                          }
                          return GeckoResult.fromValue(popupSession)
                      }
                  })

                  // MessageDelegate — background <-> content script messaging
                  // setMessageDelegate(delegate, nativeApp) — no session param in GeckoView 136
                  ext.setMessageDelegate(object : MessageDelegate {
                      override fun onMessage(nativeApp: String, message: Any, sender: WebExtension.MessageSender): GeckoResult<Any>? {
                          return null // pass-through; extensions handle their own logic
                      }
                      override fun onConnect(port: WebExtension.Port) {
                          // Long-lived port — store if needed for back-messaging
                      }
                  }, "browser")
              }

              private fun updateExtensionBadge(extId: String, action: Action) {
                  // Future: show per-extension badge overlay on the menu button
                  val badge = action.badgeText
                  if (!badge.isNullOrEmpty()) {
                      android.util.Log.d("ExtBadge", "Extension $extId badge: $badge")
                  }
              }

              private fun showExtensionPopup(ext: WebExtension, popupSession: GeckoSession, title: String) {
                  val dialog = androidx.appcompat.app.AlertDialog.Builder(this)
                      .setTitle(title)
                      .setOnDismissListener { popupSession.close() }
                      .create()

                  val popupView = org.mozilla.geckoview.GeckoView(this)
                  popupSession.open(runtime)
                  popupView.setSession(popupSession)

                  dialog.setView(popupView)
                  dialog.show()

                  // Size the popup reasonably
                  dialog.window?.setLayout(
                      (resources.displayMetrics.widthPixels * 0.9).toInt(),
                      (resources.displayMetrics.heightPixels * 0.7).toInt()
                  )
              }

              private fun setupSessionDelegates(session: GeckoSession) {
                  session.settings.userAgentOverride = GECKO_UA
                  session.settings.allowJavascript = true
                  session.settings.useTrackingProtection = false

                  session.progressDelegate = object : ProgressDelegate {
                      override fun onPageStart(session: GeckoSession, url: String) {
                          runOnUiThread {
                              val idx = tabs.indexOfFirst { it.session === session }
                              if (idx >= 0) tabs[idx].url = url
                              if (idx == currentTabIndex && !urlBar.isFocused) showDisplayUrl(url)
                              progressBar.visibility = View.VISIBLE
                              progressBar.progress = 10
                          }
                      }
                      override fun onProgressChange(session: GeckoSession, progress: Int) {
                          runOnUiThread {
                              progressBar.progress = progress
                              if (progress >= 100) {
                                  progressBar.visibility = View.GONE
                              }
                          }
                      }
                      override fun onPageStop(session: GeckoSession, success: Boolean) {
                          runOnUiThread { progressBar.visibility = View.GONE }
                      }
                      override fun onSecurityChange(session: GeckoSession, securityInfo: ProgressDelegate.SecurityInformation) {
                          runOnUiThread {
                              val idx = tabs.indexOfFirst { it.session === session }
                              if (idx == currentTabIndex) {
                                  lockIcon.visibility = if (securityInfo.isSecure) View.VISIBLE else View.GONE
                              }
                          }
                      }
                  }

                  session.navigationDelegate = object : NavigationDelegate {
                      override fun onLocationChange(session: GeckoSession, url: String?,
                              perms: MutableList<GeckoSession.PermissionDelegate.ContentPermission>,
                              hasUserGesture: Boolean) {
                          runOnUiThread {
                              val idx = tabs.indexOfFirst { it.session === session }
                              if (idx >= 0) tabs[idx].url = url ?: ""
                              if (idx == currentTabIndex && !urlBar.isFocused) showDisplayUrl(url ?: "")
                          }
                      }
                      override fun onCanGoBack(session: GeckoSession, canGoBack: Boolean) {
                          runOnUiThread { btnBack.alpha = if (canGoBack) 1.0f else 0.4f }
                      }
                      override fun onCanGoForward(session: GeckoSession, canGoForward: Boolean) {
                          runOnUiThread { btnForward.alpha = if (canGoForward) 1.0f else 0.4f }
                      }
                  }

                  session.contentDelegate = object : ContentDelegate {
                      override fun onTitleChange(session: GeckoSession, title: String?) {
                          runOnUiThread {
                              val idx = tabs.indexOfFirst { it.session === session }
                              if (idx >= 0) { tabs[idx].title = title ?: ""; tabAdapter.notifyItemChanged(idx) }
                          }
                      }
                      override fun onContextMenu(session: GeckoSession, screenX: Int, screenY: Int, element: ContentDelegate.ContextElement) {
                          // Long-press context menu placeholder
                      }
                  }

              }

              private fun openNewTab(url: String) {
                  val session = GeckoSession()
                  setupSessionDelegates(session)
                  session.open(runtime)

                  // Wire all already-installed extensions to this new session
                  runtime.webExtensionController.list().accept { extensions ->
                      extensions?.forEach { ext -> wireExtensionToSession(ext, session) }
                  }

                  val isHome = url == "about:home"
                  val tab = BrowserTab(session, if (isHome) "" else url)
                  tabs.add(tab)
                  tabAdapter.notifyItemInserted(tabs.size - 1)
                  switchToTab(tabs.size - 1)
                  updateTabCount()
                  if (isHome) showHomePage() else session.loadUri(url)
              }

              private fun switchToTab(index: Int) {
                  currentTabIndex = index
                  geckoView.setSession(tabs[index].session)
                  if (tabs[index].url.isEmpty()) showHomePage()
                  else showDisplayUrl(tabs[index].url)
                  tabsContainer.visibility = View.GONE
              }

              private fun closeTab(index: Int) {
                  if (tabs.size <= 1) {
                      openNewTab("about:home")
                      tabs[0].session.close(); tabs.removeAt(0)
                      tabAdapter.notifyDataSetChanged(); updateTabCount(); return
                  }
                  tabs[index].session.close(); tabs.removeAt(index)
                  tabAdapter.notifyDataSetChanged()
                  switchToTab(maxOf(0, if (index >= tabs.size) tabs.size - 1 else index))
                  updateTabCount()
              }

              private fun loadUrl(input: String) {
                  val url = when {
                      input.startsWith("http://") || input.startsWith("https://") -> input
                      input.contains(".") && !input.contains(" ") -> "https://$input"
                      else -> "https://www.google.com/search?q=${Uri.encode(input)}"
                  }
                  tabs.getOrNull(currentTabIndex)?.apply { session.loadUri(url); this.url = url }
                  showDisplayUrl(url)
              }

              private val HOME_PAGE_TAG = "home_page_view"

              private fun showHomePage() {
                  geckoView.visibility = View.GONE
                  val container = findViewById<androidx.coordinatorlayout.widget.CoordinatorLayout>(R.id.root_layout)
                  var homeView = container.findViewWithTag<View>(HOME_PAGE_TAG)
                  if (homeView == null) {
                      val inflated = layoutInflater.inflate(R.layout.home_page, container, false)
                      inflated.tag = HOME_PAGE_TAG
                      val params = androidx.coordinatorlayout.widget.CoordinatorLayout.LayoutParams(
                          android.view.ViewGroup.LayoutParams.MATCH_PARENT,
                          android.view.ViewGroup.LayoutParams.MATCH_PARENT
                      )
                      params.bottomMargin = resources.getDimensionPixelSize(R.dimen.toolbar_height)
                      inflated.layoutParams = params
                      container.addView(inflated)
                      homeView = inflated
                      homeView.findViewById<EditText>(R.id.home_search_bar)?.setOnEditorActionListener { v, actionId, _ ->
                          if (actionId == EditorInfo.IME_ACTION_GO || actionId == EditorInfo.IME_ACTION_DONE) {
                              val input = v.text.toString()
                              hideHomePage()
                              loadUrl(input)
                              true
                          } else false
                      }
                  }
                  homeView.visibility = View.VISIBLE
                  urlBar.setText("")
                  lockIcon.visibility = View.GONE
              }

              private fun hideHomePage() {
                  val container = findViewById<androidx.coordinatorlayout.widget.CoordinatorLayout>(R.id.root_layout)
                  container.findViewWithTag<View>(HOME_PAGE_TAG)?.visibility = View.GONE
                  geckoView.visibility = View.VISIBLE
              }

              private fun toggleDesktopMode() {
                  isDesktopMode = !isDesktopMode
                  tabs.forEach { tab ->
                      tab.session.settings.userAgentOverride = GECKO_UA
                      tab.session.settings.viewportMode = if (isDesktopMode)
                          GeckoSessionSettings.VIEWPORT_MODE_DESKTOP
                      else
                          GeckoSessionSettings.VIEWPORT_MODE_MOBILE
                      tab.session.reload()
                  }
                  Toast.makeText(this, if (isDesktopMode) "Desktop mode on" else "Mobile mode on", Toast.LENGTH_SHORT).show()
              }

              private fun showBrowserMenu(anchor: View) {
                  val popup = PopupMenu(this, anchor)
                  popup.menuInflater.inflate(R.menu.browser_menu, popup.menu)
                  popup.menu.findItem(R.id.menu_desktop_mode)?.title =
                      if (isDesktopMode) "Mobile mode" else "Desktop mode"
                  popup.setOnMenuItemClickListener { item ->
                      when (item.itemId) {
                          R.id.menu_new_tab        -> { openNewTab("about:home"); true }
                          R.id.menu_new_incognito  -> { openNewTab("https://www.google.com"); true }
                          R.id.menu_close_tab      -> { closeTab(currentTabIndex); true }
                          R.id.menu_refresh        -> { tabs.getOrNull(currentTabIndex)?.session?.reload(); true }
                          R.id.menu_extensions     -> { startActivity(Intent(this, ExtensionManagerActivity::class.java)); true }
                          R.id.menu_find_in_page   -> { showFindInPageHint(); true }
                          R.id.menu_desktop_mode   -> { toggleDesktopMode(); true }
                          R.id.menu_settings       -> { showSettingsDialog(); true }
                          else -> false
                      }
                  }
                  popup.show()
              }

              private fun showFindInPageHint() {
                  Toast.makeText(this, "Find in page (coming soon)", Toast.LENGTH_SHORT).show()
              }

              private fun showSettingsDialog() {
                  AlertDialog.Builder(this)
                      .setTitle("Settings")
                      .setMessage("GeckoView Browser\nDRM: Enabled\nExtensions: Supported")
                      .setPositiveButton("OK", null).show()
              }
          }

