          cat > app/src/main/res/layout/activity_main.xml << 'MAINXML'
          <?xml version="1.0" encoding="utf-8"?>
          <androidx.coordinatorlayout.widget.CoordinatorLayout
              xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:id="@+id/root_layout"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:fitsSystemWindows="false"
              android:background="#202124">

              <!-- Web content — full screen, toolbar overlays at bottom -->
              <org.mozilla.geckoview.GeckoView
                  android:id="@+id/gecko_view"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"
                  android:layout_marginBottom="56dp"/>

              <!-- Bottom chrome: tab strip (collapsible) + single toolbar row -->
              <LinearLayout
                  android:id="@+id/bottom_chrome"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="vertical"
                  android:layout_gravity="bottom"
                  android:background="#202124"
                  android:elevation="4dp">

                  <!-- Loading progress bar -->
                  <ProgressBar
                      android:id="@+id/progress_bar"
                      style="?android:attr/progressBarStyleHorizontal"
                      android:layout_width="match_parent"
                      android:layout_height="3dp"
                      android:max="100"
                      android:progress="0"
                      android:progressTint="#1A73E8"
                      android:progressBackgroundTint="#3C4043"
                      android:visibility="gone"/>

                  <!-- Thin divider -->
                  <View
                      android:layout_width="match_parent"
                      android:layout_height="1dp"
                      android:background="#3C4043"/>

                  <!-- Tab strip — compact, shown when >1 tab -->
                  <androidx.recyclerview.widget.RecyclerView
                      android:id="@+id/tabs_recycler"
                      android:layout_width="match_parent"
                      android:layout_height="0dp"
                      android:visibility="gone"
                      android:background="#292A2D"
                      android:paddingStart="8dp"
                      android:paddingEnd="8dp"/>

                  <!-- Main toolbar: BACK | FORWARD | [URL BAR] | TABS | MENU -->
                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="56dp"
                      android:orientation="horizontal"
                      android:gravity="center_vertical"
                      android:paddingStart="2dp"
                      android:paddingEnd="2dp">

                      <!-- Back -->
                      <ImageButton
                          android:id="@+id/btn_back"
                          android:layout_width="0dp"
                          android:layout_height="48dp"
                          android:layout_weight="1"
                          android:background="?attr/selectableItemBackgroundBorderless"
                          android:src="@drawable/ic_arrow_back"
                          android:alpha="0.4"
                          android:scaleType="center"
                          android:contentDescription="Back"/>

                      <!-- Forward -->
                      <ImageButton
                          android:id="@+id/btn_forward"
                          android:layout_width="0dp"
                          android:layout_height="48dp"
                          android:layout_weight="1"
                          android:background="?attr/selectableItemBackgroundBorderless"
                          android:src="@drawable/ic_arrow_forward"
                          android:alpha="0.4"
                          android:scaleType="center"
                          android:contentDescription="Forward"/>

                      <!-- URL pill — takes most of the space -->
                      <LinearLayout
                          android:id="@+id/url_bar_container"
                          android:layout_width="0dp"
                          android:layout_height="40dp"
                          android:layout_weight="4"
                          android:layout_marginStart="4dp"
                          android:layout_marginEnd="4dp"
                          android:background="@drawable/url_bar_bg"
                          android:orientation="horizontal"
                          android:gravity="center_vertical"
                          android:paddingStart="14dp"
                          android:paddingEnd="10dp">

                          <ImageView
                              android:id="@+id/lock_icon"
                              android:layout_width="14dp"
                              android:layout_height="14dp"
                              android:src="@drawable/ic_lock"
                              android:layout_marginEnd="6dp"
                              android:visibility="gone"/>

                          <EditText
                              android:id="@+id/url_bar"
                              android:layout_width="0dp"
                              android:layout_height="match_parent"
                              android:layout_weight="1"
                              android:background="@null"
                              android:hint="Search or type URL"
                              android:imeOptions="actionGo|flagNoExtractUi"
                              android:inputType="textUri|textNoSuggestions"
                              android:maxLines="1"
                              android:singleLine="true"
                              android:textColor="#E8EAED"
                              android:textColorHint="#9AA0A6"
                              android:textSize="15sp"
                              android:gravity="center"
                              android:selectAllOnFocus="true"
                              android:ellipsize="middle"/>

                      </LinearLayout>

                      <!-- Tab switcher with live count badge -->
                      <FrameLayout
                          android:id="@+id/btn_new_tab"
                          android:layout_width="0dp"
                          android:layout_height="48dp"
                          android:layout_weight="1"
                          android:background="?attr/selectableItemBackgroundBorderless"
                          android:clickable="true"
                          android:focusable="true">

                          <ImageView
                              android:layout_width="22dp"
                              android:layout_height="22dp"
                              android:layout_gravity="center"
                              android:src="@drawable/ic_tab_count"/>

                          <TextView
                              android:id="@+id/tab_count_text"
                              android:layout_width="22dp"
                              android:layout_height="22dp"
                              android:layout_gravity="center"
                              android:gravity="center"
                              android:textColor="#FFFFFF"
                              android:textSize="10sp"
                              android:textStyle="bold"
                              android:text="1"/>

                      </FrameLayout>

                      <!-- 3-dot menu -->
                      <ImageButton
                          android:id="@+id/btn_menu"
                          android:layout_width="0dp"
                          android:layout_height="48dp"
                          android:layout_weight="1"
                          android:background="?attr/selectableItemBackgroundBorderless"
                          android:src="@drawable/ic_more_vert"
                          android:scaleType="center"
                          android:contentDescription="Menu"/>

                  </LinearLayout>

              </LinearLayout>

