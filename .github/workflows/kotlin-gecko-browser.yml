          # ExtensionManagerActivity.kt
          cat > app/src/main/kotlin/com/personal/geckobrowser/ExtensionManagerActivity.kt << 'EXTKT'
          package com.personal.geckobrowser

          import android.app.Activity
          import android.content.Intent
          import android.net.Uri
          import android.os.Bundle
          import android.provider.OpenableColumns
          import android.view.*
          import android.widget.*
          import androidx.appcompat.app.AlertDialog
          import androidx.recyclerview.widget.LinearLayoutManager
          import androidx.recyclerview.widget.RecyclerView
          import org.mozilla.geckoview.WebExtension
          import java.io.File
          import java.io.FileOutputStream
          import java.util.zip.ZipInputStream

          class ExtensionManagerActivity : BaseActivity() {

              companion object {
                  const val PICK_EXTENSION = 1001
              }

              // Holds live WebExtension objects — not just names
              private val installedExtensions = mutableListOf<WebExtension>()
              private lateinit var extAdapter: ExtensionAdapter

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_extension_manager)

                  findViewById<ImageButton>(R.id.btn_back_ext).setOnClickListener { finish() }

                  val recycler = findViewById<RecyclerView>(R.id.extension_list)
                  extAdapter = ExtensionAdapter(installedExtensions,
                      onToggle = { ext, enabled -> toggleExtension(ext, enabled) },
                      onUninstall = { ext -> uninstallExtension(ext) }
                  )
                  recycler.layoutManager = LinearLayoutManager(this)
                  recycler.adapter = extAdapter

                  // Load from GeckoView — the source of truth
                  loadInstalledExtensions()

                  findViewById<Button>(R.id.btn_install_from_file).setOnClickListener {
                      val intent = Intent(Intent.ACTION_GET_CONTENT).apply {
                          type = "*/*"
                          putExtra(Intent.EXTRA_MIME_TYPES, arrayOf(
                              "application/zip", "application/x-zip-compressed",
                              "application/octet-stream", "application/x-xpinstall"
                          ))
                      }
                      startActivityForResult(intent, PICK_EXTENSION)
                  }

                  findViewById<Button>(R.id.btn_install_from_url).setOnClickListener { showUrlInstallDialog() }
              }

              private fun loadInstalledExtensions() {
                  val rt = MainActivity.appRuntime ?: return
                  rt.webExtensionController.list().accept { extensions ->
                      runOnUiThread {
                          installedExtensions.clear()
                          extensions?.let { installedExtensions.addAll(it) }
                          extAdapter.notifyDataSetChanged()
                      }
                  }
              }

              private fun toggleExtension(ext: WebExtension, enable: Boolean) {
                  val rt = MainActivity.appRuntime ?: return
                  val op = if (enable)
                      rt.webExtensionController.enable(ext, WebExtension.Flags.NONE.toInt())
                  else
                      rt.webExtensionController.disable(ext, WebExtension.Flags.NONE.toInt())
                  op.accept({ updated ->
                      runOnUiThread {
                          val idx = installedExtensions.indexOfFirst { it.id == ext.id }
                          if (idx >= 0 && updated != null) {
                              installedExtensions[idx] = updated
                              extAdapter.notifyItemChanged(idx)
                          }
                          Toast.makeText(this, if (enable) "Enabled" else "Disabled", Toast.LENGTH_SHORT).show()
                      }
                  }, { err ->
                      runOnUiThread { Toast.makeText(this, "Failed: ${err?.message}", Toast.LENGTH_SHORT).show() }
                  })
              }

              private fun uninstallExtension(ext: WebExtension) {
                  val rt = MainActivity.appRuntime ?: return
                  AlertDialog.Builder(this)
                      .setTitle("Uninstall")
                      .setMessage("Remove \"${ext.metaData?.name ?: ext.id}\"?")
                      .setPositiveButton("Remove") { _, _ ->
                          rt.webExtensionController.uninstall(ext).accept({
                              runOnUiThread {
                                  val idx = installedExtensions.indexOfFirst { it.id == ext.id }
                                  if (idx >= 0) {
                                      installedExtensions.removeAt(idx)
                                      extAdapter.notifyItemRemoved(idx)
                                  }
                                  // Clean up extracted files if any
                                  File(filesDir, "extensions/${ext.id}").deleteRecursively()
                                  Toast.makeText(this, "Uninstalled", Toast.LENGTH_SHORT).show()
                              }
                          }, { err ->
                              runOnUiThread { Toast.makeText(this, "Failed: ${err?.message}", Toast.LENGTH_SHORT).show() }
                          })
                      }
                      .setNegativeButton("Cancel", null)
                      .show()
              }

              override fun onActivityResult(requestCode: Int, resultCode: Int, data: Intent?) {
                  super.onActivityResult(requestCode, resultCode, data)
                  if (requestCode == PICK_EXTENSION && resultCode == Activity.RESULT_OK)
                      data?.data?.let { installExtensionFromUri(it) }
              }

              private fun installExtensionFromUri(uri: Uri) {
                  val rt = MainActivity.appRuntime ?: return
                  Thread {
                      try {
                          val fileName = getFileName(uri) ?: "ext_${System.currentTimeMillis()}"
                          val extName = fileName.removeSuffix(".zip").removeSuffix(".xpi")
                          val extDir = File(filesDir, "extensions/$extName").also { it.mkdirs() }

                          contentResolver.openInputStream(uri)?.use { input ->
                              ZipInputStream(input).use { zip ->
                                  var entry = zip.nextEntry
                                  while (entry != null) {
                                      val f = File(extDir, entry.name)
                                      if (entry.isDirectory) f.mkdirs()
                                      else { f.parentFile?.mkdirs(); FileOutputStream(f).use { zip.copyTo(it) } }
                                      entry = zip.nextEntry
                                  }
                              }
                          }

                          rt.webExtensionController.install("file://${extDir.absolutePath}/")
                              .accept({ ext ->
                                  runOnUiThread {
                                      if (ext != null) { installedExtensions.add(ext); extAdapter.notifyItemInserted(installedExtensions.size - 1) }
                                      Toast.makeText(this, "Extension installed!", Toast.LENGTH_SHORT).show()
                                  }
                              }, { err ->
                                  runOnUiThread { Toast.makeText(this, "Install failed: ${err?.message}", Toast.LENGTH_LONG).show() }
                              })
                      } catch (e: Exception) {
                          runOnUiThread { Toast.makeText(this, "Error: ${e.message}", Toast.LENGTH_LONG).show() }
                      }
                  }.start()
              }

              private fun showUrlInstallDialog() {
                  val input = EditText(this).apply { hint = "https://addons.mozilla.org/..." }
                  AlertDialog.Builder(this)
                      .setTitle("Install from URL")
                      .setView(input)
                      .setPositiveButton("Install") { _, _ ->
                          val url = input.text.toString().trim()
                          if (url.isEmpty()) return@setPositiveButton
                          val rt = MainActivity.appRuntime ?: return@setPositiveButton
                          rt.webExtensionController.install(url)
                              .accept({ ext ->
                                  runOnUiThread {
                                      if (ext != null) { installedExtensions.add(ext); extAdapter.notifyItemInserted(installedExtensions.size - 1) }
                                      Toast.makeText(this, "Installed!", Toast.LENGTH_SHORT).show()
                                  }
                              }, { err ->
                                  runOnUiThread { Toast.makeText(this, "Failed: ${err?.message}", Toast.LENGTH_LONG).show() }
                              })
                      }
                      .setNegativeButton("Cancel", null).show()
              }

              private fun getFileName(uri: Uri): String? =
                  contentResolver.query(uri, null, null, null, null)?.use { c ->
                      val i = c.getColumnIndex(OpenableColumns.DISPLAY_NAME)
                      if (c.moveToFirst() && i >= 0) c.getString(i) else null
                  }

              // ── RecyclerView adapter for extensions ────────────────────────
              inner class ExtensionAdapter(
                  private val items: List<WebExtension>,
                  private val onToggle: (WebExtension, Boolean) -> Unit,
                  private val onUninstall: (WebExtension) -> Unit
              ) : RecyclerView.Adapter<ExtensionAdapter.VH>() {

                  inner class VH(v: View) : RecyclerView.ViewHolder(v) {
                      val name: TextView = v.findViewById(R.id.ext_name)
                      val id: TextView = v.findViewById(R.id.ext_id)
                      val toggle: android.widget.Switch = v.findViewById(R.id.ext_toggle)
                      val btnRemove: ImageButton = v.findViewById(R.id.ext_remove)
                  }

                  override fun onCreateViewHolder(parent: ViewGroup, viewType: Int) =
                      VH(LayoutInflater.from(parent.context).inflate(R.layout.item_extension, parent, false))

                  override fun getItemCount() = items.size

                  override fun onBindViewHolder(holder: VH, position: Int) {
                      val ext = items[position]
                      holder.name.text = ext.metaData?.name ?: ext.id
                      holder.id.text = ext.id
                      holder.toggle.setOnCheckedChangeListener(null)
                      holder.toggle.isChecked = ext.metaData?.enabled ?: true
                      holder.toggle.setOnCheckedChangeListener { _, checked -> onToggle(ext, checked) }
                      holder.btnRemove.setOnClickListener { onUninstall(ext) }
                  }
              }
          }
