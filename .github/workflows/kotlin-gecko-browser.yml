          # CMakeLists.txt
          cat > app/src/main/cpp/CMakeLists.txt << 'CMAKELISTS'
          cmake_minimum_required(VERSION 3.22.1)
          project("browsernative")

          add_library(browsernative SHARED
              browser_native.cpp
              download_helper.cpp
              crash_handler.cpp
