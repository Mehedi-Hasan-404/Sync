          # browser_native.cpp — JNI entry point, ABI/kernel/RAM queries
          cat > app/src/main/cpp/browser_native.cpp << 'BROWSERNATIVE'
          #include <jni.h>
          #include <string>
          #include <sys/utsname.h>
          #include <android/log.h>

          #define LOG_TAG "BrowserNative"
          #define LOGI(...) __android_log_print(ANDROID_LOG_INFO,  LOG_TAG, __VA_ARGS__)

          extern "C" {

          JNIEXPORT jstring JNICALL
          Java_com_personal_geckobrowser_NativeBridge_getAbi(JNIEnv *env, jclass) {
          #if defined(__aarch64__)
              return env->NewStringUTF("arm64-v8a");
          #elif defined(__arm__)
              return env->NewStringUTF("armeabi-v7a");
          #elif defined(__x86_64__)
              return env->NewStringUTF("x86_64");
          #elif defined(__i386__)
              return env->NewStringUTF("x86");
          #else
              return env->NewStringUTF("unknown");
          #endif
          }

          JNIEXPORT jstring JNICALL
          Java_com_personal_geckobrowser_NativeBridge_getKernelVersion(JNIEnv *env, jclass) {
              struct utsname buf;
              if (uname(&buf) == 0) {
                  std::string ver = std::string(buf.sysname) + "/" + buf.release;
                  return env->NewStringUTF(ver.c_str());
              }
              return env->NewStringUTF("Linux/unknown");
          }

          JNIEXPORT jlong JNICALL
          Java_com_personal_geckobrowser_NativeBridge_getAvailableRamMb(JNIEnv *, jclass) {
              FILE *f = fopen("/proc/meminfo", "r");
              if (!f) return -1;
              long long kb = 0;
              char line[256];
              while (fgets(line, sizeof(line), f)) {
                  if (sscanf(line, "MemAvailable: %lld kB", &kb) == 1) break;
              }
              fclose(f);
              return (jlong)(kb / 1024);
          }

          } // extern "C"
          BROWSERNATIVE

          # download_helper.cpp
          cat > app/src/main/cpp/download_helper.cpp << 'DLHELPER'
          #include <jni.h>
          #include <cstdio>
          #include <android/log.h>

          #define LOG_TAG "DownloadHelper"
          #define LOGE(...) __android_log_print(ANDROID_LOG_ERROR, LOG_TAG, __VA_ARGS__)

          extern "C" {

          JNIEXPORT jint JNICALL
          Java_com_personal_geckobrowser_NativeBridge_writeChunk(
                  JNIEnv *env, jclass,
                  jstring filePath, jbyteArray data, jint offset, jint length, jboolean append) {
              const char *path = env->GetStringUTFChars(filePath, nullptr);
              jbyte *buf = env->GetByteArrayElements(data, nullptr);
              FILE *f = fopen(path, append ? "ab" : "wb");
              int written = 0;
              if (f) { written = (int)fwrite(buf + offset, 1, length, f); fclose(f); }
              else { LOGE("writeChunk: cannot open %s", path); }
              env->ReleaseByteArrayElements(data, buf, JNI_ABORT);
              env->ReleaseStringUTFChars(filePath, path);
              return written;
          }

          JNIEXPORT jlong JNICALL
          Java_com_personal_geckobrowser_NativeBridge_getFileSize(
                  JNIEnv *env, jclass, jstring filePath) {
              const char *path = env->GetStringUTFChars(filePath, nullptr);
              FILE *f = fopen(path, "rb");
              long size = -1;
              if (f) { fseek(f, 0, SEEK_END); size = ftell(f); fclose(f); }
              env->ReleaseStringUTFChars(filePath, path);
              return (jlong)size;
          }

          } // extern "C"
          DLHELPER

          # crash_handler.cpp
          cat > app/src/main/cpp/crash_handler.cpp << 'CRASHHANDLER'
          #include <jni.h>
          #include <signal.h>
          #include <string>
          #include <cstdio>
          #include <ctime>
          #include <unistd.h>
          #include <android/log.h>

          #define LOG_TAG "CrashHandler"
          #define LOGE(...) __android_log_print(ANDROID_LOG_ERROR, LOG_TAG, __VA_ARGS__)

          static std::string g_crash_log_path;

          static void crash_signal_handler(int sig) {
              if (!g_crash_log_path.empty()) {
                  FILE *f = fopen(g_crash_log_path.c_str(), "a");
                  if (f) {
                      time_t t = time(nullptr);
                      char ts[64];
                      strftime(ts, sizeof(ts), "%Y-%m-%dT%H:%M:%S", gmtime(&t));
                      fprintf(f, "[%s] CRASH signal=%d pid=%d\n", ts, sig, getpid());
                      fclose(f);
                  }
              }
              LOGE("Crash signal %d received", sig);
              signal(sig, SIG_DFL);
              raise(sig);
          }

          extern "C" {

          JNIEXPORT void JNICALL
          Java_com_personal_geckobrowser_NativeBridge_installCrashHandler(
                  JNIEnv *env, jclass, jstring logPath) {
              const char *path = env->GetStringUTFChars(logPath, nullptr);
              g_crash_log_path = path;
              env->ReleaseStringUTFChars(logPath, path);
              struct sigaction sa{};
              sa.sa_handler = crash_signal_handler;
              sigemptyset(&sa.sa_mask);
              sa.sa_flags = SA_RESETHAND;
              sigaction(SIGSEGV, &sa, nullptr);
              sigaction(SIGABRT, &sa, nullptr);
              sigaction(SIGBUS,  &sa, nullptr);
          }

          } // extern "C"
          CRASHHANDLER

          # NativeBridge.kt — JNI declarations
          cat > app/src/main/kotlin/com/personal/geckobrowser/NativeBridge.kt << 'NATIVEBRIDGEKT'
          package com.personal.geckobrowser

          object NativeBridge {
              init { System.loadLibrary("browsernative") }

              /** ABI this binary was compiled for, e.g. "arm64-v8a" */
              external fun getAbi(): String

              /** Kernel version string, e.g. "Linux/5.15.123-android14" */
              external fun getKernelVersion(): String

              /** Available RAM in MB from /proc/meminfo */
              external fun getAvailableRamMb(): Long

              /**
               * Writes [length] bytes from [data][offset..] to [filePath].
               * [append] = true opens file in append mode.
               * Returns bytes written, or -1 on error.
               */
              external fun writeChunk(filePath: String, data: ByteArray,
                                      offset: Int, length: Int, append: Boolean): Int

              /** File size in bytes, or -1 if not found */
              external fun getFileSize(filePath: String): Long

              /**
               * Installs a native SIGSEGV/SIGABRT/SIGBUS handler that logs
               * a crash entry to [logPath] before re-raising the signal.
               */
              external fun installCrashHandler(logPath: String)
          }
          NATIVEBRIDGEKT

          cat > app/proguard-rules.pro << 'PROGUARD'
          -keep class org.mozilla.geckoview.** { *; }
          -keep class com.personal.geckobrowser.NativeBridge { *; }
          -keepclasseswithmembernames class * { native <methods>; }
          PROGUARD

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Generate Gradle wrapper
        working-directory: KotlinGeckoBrowser
        run: |
          gradle wrapper --gradle-version=8.11.1
          chmod +x gradlew

      - name: Build Kotlin Gecko Browser Debug APK
        working-directory: KotlinGeckoBrowser
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload Kotlin Gecko Browser APK
        uses: actions/upload-artifact@v4
        with:
          name: KotlinGeckoBrowser-debug-apk
          path: KotlinGeckoBrowser/app/build/outputs/apk/debug/
          retention-days: 30

      - name: Build Kotlin Gecko Browser Release APK (unsigned)
        working-directory: KotlinGeckoBrowser
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload Kotlin Release APK
        uses: actions/upload-artifact@v4
        with:
          name: KotlinGeckoBrowser-release-unsigned-apk
          path: KotlinGeckoBrowser/app/build/outputs/apk/release/
          retention-days: 30
