          THEMES

          cat > app/src/main/res/values/strings.xml << 'STRINGS'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Personal Browser</string>
          </resources>
          STRINGS

          cat > app/proguard-rules.pro << 'PROGUARD'
          -keep class org.mozilla.geckoview.** { *; }
          PROGUARD

      - name: Setup Gradle wrapper for Kotlin project
        run: |
          cd KotlinGeckoBrowser
          gradle wrapper --gradle-version=8.4 || true
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'WRAPPERPROPS'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          WRAPPERPROPS

      - name: Install Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: '8.4'

      - name: Build Kotlin Gecko Browser Debug APK
        working-directory: KotlinGeckoBrowser
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload Kotlin Gecko Browser APK
        uses: actions/upload-artifact@v4
        with:
          name: KotlinGeckoBrowser-debug-apk
          path: KotlinGeckoBrowser/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build Kotlin Gecko Browser Release APK (unsigned)
        working-directory: KotlinGeckoBrowser
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Upload Kotlin Release APK
        uses: actions/upload-artifact@v4
        with:
          name: KotlinGeckoBrowser-release-unsigned-apk
          path: KotlinGeckoBrowser/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
