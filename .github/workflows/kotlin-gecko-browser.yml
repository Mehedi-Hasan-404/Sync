          # activity_main.xml — exact Chrome bottom-bar layout
          # Single toolbar row: back | forward | [URL pill] | tab-switcher | ⋮
          # Tab strip sits ABOVE the toolbar, hidden unless multiple tabs exist
          cat > app/src/main/res/layout/activity_main.xml << 'MAINXML'
          <?xml version="1.0" encoding="utf-8"?>
          <androidx.coordinatorlayout.widget.CoordinatorLayout
              xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:fitsSystemWindows="true"
              android:background="#202124">

              <!-- Web content — full screen, toolbar overlays at bottom -->
              <org.mozilla.geckoview.GeckoView
                  android:id="@+id/gecko_view"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"
                  android:layout_marginBottom="56dp"/>

              <!-- Bottom chrome: tab strip (collapsible) + single toolbar row -->
              <LinearLayout
                  android:id="@+id/bottom_chrome"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="vertical"
                  android:layout_gravity="bottom"
                  android:background="#202124"
                  android:elevation="4dp">

                  <!-- Thin divider -->
                  <View
                      android:layout_width="match_parent"
                      android:layout_height="1dp"
                      android:background="#3C4043"/>

                  <!-- Tab strip — compact, shown when >1 tab -->
                  <androidx.recyclerview.widget.RecyclerView
                      android:id="@+id/tabs_recycler"
                      android:layout_width="match_parent"
                      android:layout_height="0dp"
                      android:visibility="gone"
                      android:background="#292A2D"
                      android:paddingStart="8dp"
                      android:paddingEnd="8dp"/>

                  <!-- Main toolbar: BACK | FORWARD | [URL BAR] | TABS | MENU -->
                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="56dp"
                      android:orientation="horizontal"
                      android:gravity="center_vertical"
                      android:paddingStart="2dp"
                      android:paddingEnd="2dp">

                      <!-- Back -->
                      <ImageButton
                          android:id="@+id/btn_back"
                          android:layout_width="0dp"
                          android:layout_height="48dp"
                          android:layout_weight="1"
                          android:background="?attr/selectableItemBackgroundBorderless"
                          android:src="@drawable/ic_arrow_back"
                          android:alpha="0.4"
                          android:scaleType="center"
                          android:contentDescription="Back"/>

                      <!-- Forward -->
                      <ImageButton
                          android:id="@+id/btn_forward"
                          android:layout_width="0dp"
                          android:layout_height="48dp"
                          android:layout_weight="1"
                          android:background="?attr/selectableItemBackgroundBorderless"
                          android:src="@drawable/ic_arrow_forward"
                          android:alpha="0.4"
                          android:scaleType="center"
                          android:contentDescription="Forward"/>

                      <!-- URL pill — takes most of the space -->
                      <LinearLayout
                          android:id="@+id/url_bar_container"
                          android:layout_width="0dp"
                          android:layout_height="40dp"
                          android:layout_weight="4"
                          android:layout_marginStart="4dp"
                          android:layout_marginEnd="4dp"
                          android:background="@drawable/url_bar_bg"
                          android:orientation="horizontal"
                          android:gravity="center_vertical"
                          android:paddingStart="14dp"
                          android:paddingEnd="10dp">

                          <ImageView
                              android:id="@+id/lock_icon"
                              android:layout_width="14dp"
                              android:layout_height="14dp"
                              android:src="@drawable/ic_lock"
                              android:layout_marginEnd="6dp"
                              android:visibility="gone"/>

                          <EditText
                              android:id="@+id/url_bar"
                              android:layout_width="0dp"
                              android:layout_height="match_parent"
                              android:layout_weight="1"
                              android:background="@null"
                              android:hint="Search or type URL"
                              android:imeOptions="actionGo|flagNoExtractUi"
                              android:inputType="textUri|textNoSuggestions"
                              android:maxLines="1"
                              android:singleLine="true"
                              android:textColor="#E8EAED"
                              android:textColorHint="#9AA0A6"
                              android:textSize="15sp"
                              android:gravity="center"
                              android:selectAllOnFocus="true"
                              android:ellipsize="middle"/>

                      </LinearLayout>

                      <!-- Tab switcher with live count badge -->
                      <FrameLayout
                          android:id="@+id/btn_new_tab"
                          android:layout_width="0dp"
                          android:layout_height="48dp"
                          android:layout_weight="1"
                          android:background="?attr/selectableItemBackgroundBorderless"
                          android:clickable="true"
                          android:focusable="true">

                          <ImageView
                              android:layout_width="22dp"
                              android:layout_height="22dp"
                              android:layout_gravity="center"
                              android:src="@drawable/ic_tab_count"/>

                          <TextView
                              android:id="@+id/tab_count_text"
                              android:layout_width="22dp"
                              android:layout_height="22dp"
                              android:layout_gravity="center"
                              android:gravity="center"
                              android:textColor="#FFFFFF"
                              android:textSize="10sp"
                              android:textStyle="bold"
                              android:text="1"/>

                      </FrameLayout>

                      <!-- 3-dot menu -->
                      <ImageButton
                          android:id="@+id/btn_menu"
                          android:layout_width="0dp"
                          android:layout_height="48dp"
                          android:layout_weight="1"
                          android:background="?attr/selectableItemBackgroundBorderless"
                          android:src="@drawable/ic_more_vert"
                          android:scaleType="center"
                          android:contentDescription="Menu"/>

                  </LinearLayout>

              </LinearLayout>

          </androidx.coordinatorlayout.widget.CoordinatorLayout>
          MAINXML

          # item_tab.xml — Chrome compact tab strip chip
          cat > app/src/main/res/layout/item_tab.xml << 'TABXML'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="wrap_content"
              android:layout_height="36dp"
              android:background="@drawable/tab_item_bg"
              android:gravity="center_vertical"
              android:orientation="horizontal"
              android:paddingStart="10dp"
              android:paddingEnd="6dp"
              android:layout_marginEnd="3dp"
              android:minWidth="96dp"
              android:maxWidth="160dp">

              <!-- Favicon placeholder dot -->
              <View
                  android:layout_width="8dp"
                  android:layout_height="8dp"
                  android:background="@drawable/favicon_dot"
                  android:layout_marginEnd="6dp"/>

              <TextView
                  android:id="@+id/tab_title"
                  android:layout_width="0dp"
                  android:layout_height="wrap_content"
                  android:layout_weight="1"
                  android:ellipsize="end"
                  android:maxLines="1"
                  android:textColor="#E8EAED"
                  android:textSize="12sp"/>

              <ImageButton
                  android:id="@+id/btn_close_tab"
                  android:layout_width="24dp"
                  android:layout_height="24dp"
                  android:background="?attr/selectableItemBackgroundBorderless"
                  android:src="@drawable/ic_close"
                  android:padding="4dp"
                  android:layout_marginStart="4dp"
                  android:contentDescription="Close tab"/>

          </LinearLayout>
          TABXML

          # activity_extension_manager.xml - Material dark style
          cat > app/src/main/res/layout/activity_extension_manager.xml << 'EXTXML'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:background="#202124">

              <!-- Toolbar -->
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="56dp"
                  android:orientation="horizontal"
                  android:gravity="center_vertical"
                  android:background="#292A2D"
                  android:paddingStart="4dp"
                  android:paddingEnd="16dp"
                  android:elevation="4dp">
                  <ImageButton
                      android:id="@+id/btn_back_ext"
                      android:layout_width="48dp"
                      android:layout_height="48dp"
                      android:background="?attr/selectableItemBackgroundBorderless"
                      android:src="@drawable/ic_arrow_back"
                      android:padding="12dp"
                      android:contentDescription="Back"/>
                  <TextView
                      android:layout_width="0dp"
                      android:layout_height="wrap_content"
                      android:layout_weight="1"
                      android:text="Extensions"
                      android:textColor="#E8EAED"
                      android:textSize="20sp"
                      android:textStyle="bold"/>
              </LinearLayout>

              <!-- Install buttons -->
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="horizontal"
                  android:padding="16dp"
                  android:gravity="center">

                  <com.google.android.material.button.MaterialButton
                      android:id="@+id/btn_install_from_file"
                      android:layout_width="0dp"
                      android:layout_height="wrap_content"
                      android:layout_weight="1"
                      android:layout_marginEnd="8dp"
                      android:text="From File"
                      style="@style/Widget.MaterialComponents.Button.OutlinedButton"
                      android:textColor="#8AB4F8"/>

                  <com.google.android.material.button.MaterialButton
                      android:id="@+id/btn_install_from_url"
                      android:layout_width="0dp"
                      android:layout_height="wrap_content"
                      android:layout_weight="1"
                      android:text="From URL"
                      android:backgroundTint="#1A73E8"
                      android:textColor="#FFFFFF"/>

              </LinearLayout>

              <View
                  android:layout_width="match_parent"
                  android:layout_height="1dp"
                  android:background="#3C4043"
                  android:layout_marginBottom="8dp"/>

              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Installed"
                  android:textColor="#9AA0A6"
                  android:textSize="12sp"
                  android:textAllCaps="true"
                  android:letterSpacing="0.1"
                  android:paddingStart="16dp"
                  android:paddingBottom="8dp"/>

              <ListView
                  android:id="@+id/extension_list"
                  android:layout_width="match_parent"
                  android:layout_height="0dp"
                  android:layout_weight="1"
                  android:paddingStart="8dp"
                  android:paddingEnd="8dp"/>

          </LinearLayout>
          EXTXML

          # browser_menu.xml
          cat > app/src/main/res/menu/browser_menu.xml << 'MENUXML'
          <?xml version="1.0" encoding="utf-8"?>
          <menu xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:id="@+id/menu_new_tab"       android:title="New tab"/>
              <item android:id="@+id/menu_new_incognito" android:title="New Incognito tab"/>
              <item android:id="@+id/menu_refresh"       android:title="Refresh"/>
              <item android:id="@+id/menu_close_tab"     android:title="Close tab"/>
              <item android:id="@+id/menu_extensions"    android:title="Extensions"/>
              <item android:id="@+id/menu_find_in_page"  android:title="Find in page"/>
              <item android:id="@+id/menu_settings"      android:title="Settings"/>
          </menu>
          MENUXML

          # themes and colors - Chrome dark theme
          cat > app/src/main/res/values/themes.xml << 'THEMES'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.GeckoBrowser" parent="Theme.MaterialComponents.DayNight.NoActionBar">
                  <item name="colorPrimary">#1A73E8</item>
                  <item name="colorPrimaryVariant">#1558B0</item>
                  <item name="colorOnPrimary">#FFFFFF</item>
                  <item name="colorSurface">#202124</item>
                  <item name="colorOnSurface">#E8EAED</item>
                  <item name="android:windowBackground">#202124</item>
                  <item name="android:statusBarColor">#202124</item>
                  <item name="android:navigationBarColor">#202124</item>
                  <item name="popupMenuStyle">@style/ChromePopupMenu</item>
              </style>
              <style name="ChromePopupMenu" parent="Widget.MaterialComponents.PopupMenu">
                  <item name="android:popupBackground">@drawable/popup_bg</item>
              </style>
          </resources>
          THEMES

          cat > app/src/main/res/drawable/popup_bg.xml << 'POPUPBG'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android"
              android:shape="rectangle">
              <corners android:radius="8dp"/>
              <solid android:color="#292A2D"/>
          </shape>
          POPUPBG

          cat > app/src/main/res/values/strings.xml << 'STRINGS'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Personal Browser</string>
          </resources>
          STRINGS

          cat > app/proguard-rules.pro << 'PROGUARD'
          -keep class org.mozilla.geckoview.** { *; }
          PROGUARD

      - name: Setup Gradle wrapper for Kotlin project
        run: |
          cd KotlinGeckoBrowser
          gradle wrapper --gradle-version=8.13 || true
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'WRAPPERPROPS'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.13-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          WRAPPERPROPS

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.13'

      - name: Build Kotlin Gecko Browser Debug APK
        working-directory: KotlinGeckoBrowser
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload Kotlin Gecko Browser APK
        uses: actions/upload-artifact@v4
        with:
          name: KotlinGeckoBrowser-debug-apk
          path: KotlinGeckoBrowser/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build Kotlin Gecko Browser Release APK (unsigned)
        working-directory: KotlinGeckoBrowser
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Upload Kotlin Release APK
        uses: actions/upload-artifact@v4
        with:
          name: KotlinGeckoBrowser-release-unsigned-apk
          path: KotlinGeckoBrowser/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
