name: Build Java Gecko Browser

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Android build tools
        run: |
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -f "$SDKMANAGER" ]; then
            SDKMANAGER="${ANDROID_HOME}/cmdline-tools/$(ls ${ANDROID_HOME}/cmdline-tools | sort -V | tail -1)/bin/sdkmanager"
          fi
          yes | "$SDKMANAGER" --licenses || true
          "$SDKMANAGER" "build-tools;35.0.0" "platforms;android-35" "ndk;27.2.12479018" "cmake;3.22.1"

      - name: Create Java Gecko Browser project structure
        run: |
          mkdir -p JavaGeckoBrowser
          cd JavaGeckoBrowser

          # Root build.gradle (Groovy DSL)
          cat > build.gradle << 'GRADLE'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.7.3'
              }
          }

          task clean(type: Delete) {
              delete rootProject.buildDir
          }
          GRADLE

          # settings.gradle
          cat > settings.gradle << 'SETTINGS'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
                  maven { url 'https://maven.mozilla.org/maven2' }
              }
          }
          rootProject.name = "JavaGeckoBrowser"
          include ':app'
          SETTINGS

          # gradle.properties
          cat > gradle.properties << 'PROPS'
          android.useAndroidX=true
          android.enableJetifier=false
          org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m
          PROPS

          mkdir -p app/src/main/java/com/personal/javageckobrowser
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/menu
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/assets/extensions
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi

          # Generate launcher icons via base64-encoded PNGs (blue circle, each density)
          echo "" | base64 -d > app/src/main/res/mipmap-mdpi/ic_launcher.png
          echo "" | base64 -d > app/src/main/res/mipmap-hdpi/ic_launcher.png
          echo "" | base64 -d > app/src/main/res/mipmap-xhdpi/ic_launcher.png
          echo "" | base64 -d > app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          echo "" | base64 -d > app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

          # app/build.gradle (Groovy DSL)
          cat > app/build.gradle << 'APPGRADLE'
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.personal.javageckobrowser'
              compileSdk 35

              defaultConfig {
                  applicationId 'com.personal.javageckobrowser'
                  minSdk 26
                  targetSdk 35
                  versionCode 1
                  versionName '1.0'
                  externalNativeBuild {
                      cmake {
                          cppFlags '-std=c++17 -O2'
                          arguments '-DANDROID_STL=c++_shared'
                      }
                  }
              }

              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }

              buildFeatures {
                  viewBinding true
              }

              splits {
                  abi {
                      enable true
                      reset()
                      include "arm64-v8a"
                      universalApk false
                  }
              }

              externalNativeBuild {
                  cmake {
                      path 'src/main/cpp/CMakeLists.txt'
                      version '3.22.1'
                  }
              }
          }

          dependencies {
              implementation 'org.mozilla.geckoview:geckoview-omni:136.+'
              implementation 'androidx.core:core:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'androidx.coordinatorlayout:coordinatorlayout:1.2.0'
              implementation 'androidx.recyclerview:recyclerview:1.3.2'
              implementation 'androidx.documentfile:documentfile:1.0.1'
          }
          APPGRADLE

          # AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"
                  android:maxSdkVersion="32" />
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />
              <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"
                  android:maxSdkVersion="28" />
              <uses-permission android:name="android.permission.DOWNLOAD_WITHOUT_NOTIFICATION" />

              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="Personal Browser (Java)"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.JavaGeckoBrowser"
                  android:hardwareAccelerated="true"
                  android:largeHeap="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:windowSoftInputMode="adjustResize"
                      android:configChanges="orientation|screenSize|keyboardHidden">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

                  <activity
                      android:name=".ExtensionManagerActivity"
                      android:exported="false"
                      android:label="Extension Manager" />

              </application>
          </manifest>
          MANIFEST

          # BaseActivity.java — handles edge-to-edge window decor for all activities
          cat > app/src/main/java/com/personal/javageckobrowser/BaseActivity.java << 'BASEJAVA'
          package com.personal.javageckobrowser;

          import android.graphics.Insets;
          import android.os.Bundle;
          import android.view.View;
          import android.view.WindowInsets;
          import androidx.appcompat.app.AppCompatActivity;

          public abstract class BaseActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  getWindow().setDecorFitsSystemWindows(false);
              }

              @Override
              public void onContentChanged() {
                  super.onContentChanged();
                  applyWindowInsets();
              }

              private void applyWindowInsets() {
                  View root = findViewById(android.R.id.content);
                  if (root == null) return;
                  root.setOnApplyWindowInsetsListener((v, insets) -> {
                      Insets sys = insets.getInsets(WindowInsets.Type.systemBars());
                      v.setPadding(sys.left, sys.top, sys.right, 0);
                      View bottomBar = findViewById(R.id.bottom_chrome);
                      if (bottomBar == null) bottomBar = findViewById(R.id.toolbar_ext);
                      if (bottomBar != null) bottomBar.setPadding(0, 0, 0, sys.bottom);
                      return insets;
                  });
                  root.requestApplyInsets();
              }
          }
          BASEJAVA

          # MainActivity.java
          cat > app/src/main/java/com/personal/javageckobrowser/MainActivity.java << 'MAINJAVA'
          package com.personal.javageckobrowser;

          import android.content.Intent;
          import android.net.Uri;
          import android.os.Bundle;
          import android.view.View;
          import android.view.inputmethod.EditorInfo;
          import android.widget.FrameLayout;
          import android.widget.ImageButton;
          import android.widget.ImageView;
          import android.widget.PopupMenu;
          import android.widget.TextView;
          import android.widget.Toast;

          import androidx.annotation.NonNull;
          import androidx.annotation.NonNull;
          import androidx.appcompat.app.AlertDialog;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.recyclerview.widget.LinearLayoutManager;
          import androidx.recyclerview.widget.RecyclerView;

          import org.mozilla.geckoview.AllowOrDeny;
          import org.mozilla.geckoview.GeckoResult;
          import org.mozilla.geckoview.GeckoRuntime;
          import org.mozilla.geckoview.GeckoRuntimeSettings;
          import org.mozilla.geckoview.GeckoSession;
          import org.mozilla.geckoview.GeckoSessionSettings;
          import org.mozilla.geckoview.GeckoView;
          import org.mozilla.geckoview.WebExtension;
          import org.mozilla.geckoview.WebExtensionController;
          import org.mozilla.geckoview.GeckoView;

          import java.util.ArrayList;
          import java.util.List;
          import android.widget.EditText;

          public class MainActivity extends BaseActivity {

              private GeckoRuntime runtime;
              private GeckoView geckoView;
              private EditText urlBar;
              private ImageView lockIcon;
              private RecyclerView tabsRecycler;
              private TabAdapter tabAdapter;
              private TextView tabCountText;
              private ImageButton btnBack;
              private ImageButton btnForward;
              private android.widget.ProgressBar progressBar;
              private boolean isDesktopMode = false;
              private static final String MOBILE_UA =
                  "Mozilla/5.0 (Android " + android.os.Build.VERSION.RELEASE +
                  "; Mobile; rv:137.0) Gecko/137.0 Firefox/137.0";
              private static final String DESKTOP_UA =
                  "Mozilla/5.0 (X11; Linux x86_64; rv:137.0) Gecko/20100101 Firefox/137.0";
              private final List<BrowserTab> tabs = new ArrayList<>();
              private int currentTabIndex = 0;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  if (AppRuntime.runtime == null) {
                      GeckoRuntimeSettings settings = new GeckoRuntimeSettings.Builder()
                          .extensionsProcessEnabled(true)
                          .build();
                      AppRuntime.runtime = GeckoRuntime.create(this, settings);

                      // Auto-approve all install and update prompts
                      AppRuntime.runtime.getWebExtensionController().setPromptDelegate(
                          new WebExtensionController.PromptDelegate() {
                              @Override
                              public GeckoResult<WebExtension.PermissionPromptResponse> onInstallPromptRequest(
                                      @NonNull WebExtension extension,
                                      @NonNull String[] permissions,
                                      @NonNull String[] origins,
                                      @NonNull String[] dataCollectionPermissions) {
                                  return GeckoResult.fromValue(
                                      new WebExtension.PermissionPromptResponse(true, true, false));
                              }
                              @Override
                              public GeckoResult<AllowOrDeny> onUpdatePrompt(
                                      @NonNull WebExtension current,
                                      @NonNull WebExtension updated,
                                      @NonNull String[] newPermissions,
                                      @NonNull String[] newOrigins) {
                                  return GeckoResult.fromValue(AllowOrDeny.ALLOW);
                              }
                          }
                      );
                  }
                  runtime = AppRuntime.runtime;

                  // Re-enable all previously installed extensions on startup
                  runtime.getWebExtensionController().list().accept(extensions -> {
                      if (extensions != null) {
                          for (WebExtension ext : extensions) enableExtensionOnAllSessions(ext);
                      }
                  });

                  // Install native crash handler and log ABI info
                  String crashLog = getFilesDir().getAbsolutePath() + "/crash.log";
                  NativeBridge.installCrashHandler(crashLog);
                  android.util.Log.i("Browser", "ABI=" + NativeBridge.getAbi()
                      + " RAM=" + NativeBridge.getAvailableRamMb() + "MB"
                      + " kernel=" + NativeBridge.getKernelVersion());

                  geckoView    = findViewById(R.id.gecko_view);
                  urlBar       = findViewById(R.id.url_bar);
                  lockIcon     = findViewById(R.id.lock_icon);
                  tabsRecycler = findViewById(R.id.tabs_recycler);
                  tabCountText = findViewById(R.id.tab_count_text);
                  btnBack      = findViewById(R.id.btn_back);
                  btnForward   = findViewById(R.id.btn_forward);
                  progressBar  = findViewById(R.id.progress_bar);


                  setupTabs();
                  setupUrlBar();
                  setupButtons();
                  openNewTab("about:home");
              }

              private void setupTabs() {
                  tabAdapter = new TabAdapter(tabs, this::switchToTab, this::closeTab);
                  tabsRecycler.setLayoutManager(new LinearLayoutManager(this, LinearLayoutManager.HORIZONTAL, false));
                  tabsRecycler.setAdapter(tabAdapter);
              }

              private void setupUrlBar() {
                  urlBar.setOnFocusChangeListener((v, hasFocus) -> {
                      if (hasFocus) {
                          if (currentTabIndex < tabs.size())
                              urlBar.setText(tabs.get(currentTabIndex).getUrl());
                          urlBar.selectAll();
                      } else {
                          if (currentTabIndex < tabs.size())
                              showDisplayUrl(tabs.get(currentTabIndex).getUrl());
                      }
                  });
                  urlBar.setOnEditorActionListener((v, actionId, event) -> {
                      if (actionId == EditorInfo.IME_ACTION_GO || actionId == EditorInfo.IME_ACTION_DONE) {
                          String input = urlBar.getText().toString();
                          android.view.inputmethod.InputMethodManager imm =
                              (android.view.inputmethod.InputMethodManager) getSystemService(INPUT_METHOD_SERVICE);
                          if (imm != null) imm.hideSoftInputFromWindow(urlBar.getWindowToken(), 0);
                          urlBar.clearFocus();
                          loadUrl(input);
                          return true;
                      }
                      return false;
                  });
              }

              private void showDisplayUrl(String url) {
                  if (url == null || url.isEmpty()) { urlBar.setText(""); return; }
                  String display = url;
                  try {
                      android.net.Uri uri = android.net.Uri.parse(url);
                      String host = uri.getHost();
                      if (host != null) {
                          lockIcon.setVisibility(url.startsWith("https://") ? View.VISIBLE : View.GONE);
                          display = host.replaceFirst("^www\\.", "");
                      }
                  } catch (Exception ignored) {}
                  urlBar.setText(display);
              }

              private void setupButtons() {
                  btnBack.setOnClickListener(v -> {
                      if (currentTabIndex < tabs.size()) tabs.get(currentTabIndex).getSession().goBack();
                  });
                  btnForward.setOnClickListener(v -> {
                      if (currentTabIndex < tabs.size()) tabs.get(currentTabIndex).getSession().goForward();
                  });
                  FrameLayout btnTabSwitcher = findViewById(R.id.btn_new_tab);
                  btnTabSwitcher.setOnClickListener(v -> toggleTabStrip());
                  btnTabSwitcher.setOnLongClickListener(v -> { openNewTab("about:home"); return true; });
                  ImageButton btnMenu = findViewById(R.id.btn_menu);
                  btnMenu.setOnClickListener(this::showBrowserMenu);
              }

              private void toggleTabStrip() {
                  if (tabsRecycler.getVisibility() == View.VISIBLE) {
                      tabsRecycler.setVisibility(View.GONE);
                      tabsRecycler.getLayoutParams().height = 0;
                  } else {
                      tabsRecycler.getLayoutParams().height = (int)(36 * getResources().getDisplayMetrics().density);
                      tabsRecycler.setVisibility(View.VISIBLE);
                      tabAdapter.notifyDataSetChanged();
                  }
                  tabsRecycler.requestLayout();
              }

              private void updateNavButtons() {
                  btnBack.setAlpha(0.4f);
                  btnForward.setAlpha(0.4f);
              }

              private void updateTabCount() {
                  tabCountText.setText(String.valueOf(Math.min(tabs.size(), 99)));
              }

              // Called by TabDelegate when an extension opens a new tab
              private void addExtensionTab(GeckoSession session, String url) {
                  setupSessionDelegates(session);
                  session.open(runtime);
                  BrowserTab tab = new BrowserTab(session, url);
                  tabs.add(tab);
                  tabAdapter.notifyItemInserted(tabs.size() - 1);
                  switchToTab(tabs.size() - 1);
                  updateTabCount();
                  session.loadUri(url);
              }

              // Wire ActionDelegate + MessageDelegate for all sessions when extension is installed/restored
              private void enableExtensionOnAllSessions(WebExtension ext) {
                  for (BrowserTab tab : tabs) wireExtensionToSession(ext, tab.getSession());
              }

              private void wireExtensionToSession(WebExtension ext, GeckoSession session) {
                  // ActionDelegate — GeckoView 136: no session param, set on extension directly
                  ext.setActionDelegate(new WebExtension.ActionDelegate() {
                      @Override
                      public void onBrowserAction(WebExtension extension, GeckoSession s, WebExtension.Action action) {
                          runOnUiThread(() -> updateExtensionBadge(extension.id, action));
                      }
                      @Override
                      public GeckoResult<GeckoSession> onTogglePopup(WebExtension extension, WebExtension.Action action) {
                          GeckoSession popupSession = new GeckoSession();
                          String title = action.title != null ? action.title
                              : (extension.metaData != null ? extension.metaData.name : "Extension");
                          runOnUiThread(() -> showExtensionPopup(popupSession, title));
                          return GeckoResult.fromValue(popupSession);
                      }
                  });

                  // MessageDelegate — GeckoView 136: (delegate, nativeApp) — no session param
                  ext.setMessageDelegate(new WebExtension.MessageDelegate() {
                      @Override
                      public GeckoResult<Object> onMessage(String nativeApp, Object message,
                              WebExtension.MessageSender sender) {
                          return null; // pass-through
                      }
                      @Override
                      public void onConnect(WebExtension.Port port) {
                          // Long-lived port — store if needed
                      }
                  }, "browser");
              }

              private void updateExtensionBadge(String extId, WebExtension.Action action) {
                  String badge = action.badgeText;
                  if (badge != null && !badge.isEmpty()) {
                      android.util.Log.d("ExtBadge", "Extension " + extId + " badge: " + badge);
                  }
              }

              private void showExtensionPopup(GeckoSession popupSession, String title) {
                  AlertDialog.Builder builder = new AlertDialog.Builder(this);
                  builder.setTitle(title);

                  GeckoView popupView = new GeckoView(this);
                  popupSession.open(runtime);
                  popupView.setSession(popupSession);
                  builder.setView(popupView);
                  builder.setOnDismissListener(d -> popupSession.close());

                  AlertDialog dialog = builder.create();
                  dialog.show();
                  if (dialog.getWindow() != null) {
                      dialog.getWindow().setLayout(
                          (int)(getResources().getDisplayMetrics().widthPixels * 0.9),
                          (int)(getResources().getDisplayMetrics().heightPixels * 0.7)
                      );
                  }
              }

              private static final String GECKO_UA =
                  "Mozilla/5.0 (Android " + android.os.Build.VERSION.RELEASE +
                  "; Mobile; rv:137.0) Gecko/137.0 Firefox/137.0";

              private String getGeckoUA() {
                  return isDesktopMode ? DESKTOP_UA : MOBILE_UA;
              }

              private void setupSessionDelegates(GeckoSession session) {
                  session.getSettings().setUserAgentOverride(getGeckoUA());
                  session.getSettings().setAllowJavascript(true);
                  session.getSettings().setUseTrackingProtection(false);

                  session.setProgressDelegate(new GeckoSession.ProgressDelegate() {
                      @Override
                      public void onPageStart(@NonNull GeckoSession s, @NonNull String u) {
                          runOnUiThread(() -> {
                              int idx = indexOfSession(s);
                              if (idx >= 0) tabs.get(idx).setUrl(u);
                              if (idx == currentTabIndex && !urlBar.isFocused()) showDisplayUrl(u);
                              progressBar.setVisibility(View.VISIBLE);
                              progressBar.setProgress(10);
                          });
                      }
                      @Override
                      public void onProgressChange(@NonNull GeckoSession s, int progress) {
                          runOnUiThread(() -> {
                              progressBar.setProgress(progress);
                              if (progress >= 100) progressBar.setVisibility(View.GONE);
                          });
                      }
                      @Override
                      public void onPageStop(@NonNull GeckoSession s, boolean success) {
                          runOnUiThread(() -> progressBar.setVisibility(View.GONE));
                      }
                      @Override
                      public void onSecurityChange(@NonNull GeckoSession s, @NonNull SecurityInformation info) {
                          runOnUiThread(() -> {
                              int idx = indexOfSession(s);
                              if (idx == currentTabIndex)
                                  lockIcon.setVisibility(info.isSecure ? View.VISIBLE : View.GONE);
                          });
                      }
                  });

                  session.setNavigationDelegate(new GeckoSession.NavigationDelegate() {
                      @Override
                      public void onLocationChange(@NonNull GeckoSession s, String u,
                              @NonNull java.util.List<GeckoSession.PermissionDelegate.ContentPermission> perms,
                              @NonNull Boolean hasUserGesture) {
                          runOnUiThread(() -> {
                              int idx = indexOfSession(s);
                              if (idx >= 0) tabs.get(idx).setUrl(u != null ? u : "");
                              if (idx == currentTabIndex && !urlBar.isFocused()) showDisplayUrl(u != null ? u : "");
                          });
                      }
                      @Override
                      public void onCanGoBack(@NonNull GeckoSession s, boolean canGoBack) {
                          runOnUiThread(() -> btnBack.setAlpha(canGoBack ? 1.0f : 0.4f));
                      }
                      @Override
                      public void onCanGoForward(@NonNull GeckoSession s, boolean canGoForward) {
                          runOnUiThread(() -> btnForward.setAlpha(canGoForward ? 1.0f : 0.4f));
                      }
                  });

                  session.setContentDelegate(new GeckoSession.ContentDelegate() {
                      @Override
                      public void onTitleChange(@NonNull GeckoSession s, String title) {
                          runOnUiThread(() -> {
                              int idx = indexOfSession(s);
                              if (idx >= 0) { tabs.get(idx).setTitle(title != null ? title : ""); tabAdapter.notifyItemChanged(idx); }
                          });
                      }
                  });

              }

              private void openNewTab(String url) {
                  GeckoSession session = new GeckoSession();
                  setupSessionDelegates(session);
                  session.open(runtime);

                  // Wire all already-installed extensions to this new session
                  runtime.getWebExtensionController().list().accept(extensions -> {
                      if (extensions != null) {
                          for (WebExtension ext : extensions) wireExtensionToSession(ext, session);
                      }
                  });

                  boolean isHome = "about:home".equals(url);
                  BrowserTab tab = new BrowserTab(session, isHome ? "" : url);
                  tabs.add(tab);
                  tabAdapter.notifyItemInserted(tabs.size() - 1);
                  switchToTab(tabs.size() - 1);
                  updateTabCount();
                  if (isHome) showHomePage(); else session.loadUri(url);
              }

              private int indexOfSession(GeckoSession s) {
                  for (int i = 0; i < tabs.size(); i++) if (tabs.get(i).getSession() == s) return i;
                  return -1;
              }

              private void switchToTab(int index) {
                  currentTabIndex = index;
                  geckoView.setSession(tabs.get(index).getSession());
                  if (tabs.get(index).getUrl().isEmpty()) showHomePage();
                  else showDisplayUrl(tabs.get(index).getUrl());
                  tabsRecycler.setVisibility(View.GONE);
              }

              private void closeTab(int index) {
                  if (tabs.size() <= 1) {
                      openNewTab("about:home");
                      tabs.get(0).getSession().close();
                      tabs.remove(0);
                      tabAdapter.notifyDataSetChanged();
                      updateTabCount();
                      return;
                  }
                  tabs.get(index).getSession().close();
                  tabs.remove(index);
                  tabAdapter.notifyDataSetChanged();
                  int newIndex = Math.max(0, index >= tabs.size() ? tabs.size() - 1 : index);
                  switchToTab(newIndex);
                  updateTabCount();
              }

              private void loadUrl(String input) {
                  String url;
                  if (input.startsWith("http://") || input.startsWith("https://")) {
                      url = input;
                  } else if (input.contains(".") && !input.contains(" ")) {
                      url = "https://" + input;
                  } else {
                      url = "https://www.google.com/search?q=" + Uri.encode(input);
                  }
                  if (currentTabIndex < tabs.size()) {
                      tabs.get(currentTabIndex).getSession().loadUri(url);
                      tabs.get(currentTabIndex).setUrl(url);
                  }
                  showDisplayUrl(url);
              }

              private static final String HOME_PAGE_TAG = "home_page_view";

              private void showHomePage() {
                  geckoView.setVisibility(View.GONE);
                  androidx.coordinatorlayout.widget.CoordinatorLayout container = findViewById(R.id.root_layout);
                  android.view.View homeView = container.findViewWithTag(HOME_PAGE_TAG);
                  if (homeView == null) {
                      android.view.View inflated = getLayoutInflater().inflate(R.layout.home_page, container, false);
                      inflated.setTag(HOME_PAGE_TAG);
                      androidx.coordinatorlayout.widget.CoordinatorLayout.LayoutParams params =
                          new androidx.coordinatorlayout.widget.CoordinatorLayout.LayoutParams(
                              android.view.ViewGroup.LayoutParams.MATCH_PARENT,
                              android.view.ViewGroup.LayoutParams.MATCH_PARENT);
                      int tb = getResources().getDimensionPixelSize(R.dimen.toolbar_height);
                      params.bottomMargin = tb;
                      inflated.setLayoutParams(params);
                      container.addView(inflated);
                      homeView = inflated;
                      EditText homeSearch = homeView.findViewById(R.id.home_search_bar);
                      if (homeSearch != null) {
                          homeSearch.setOnEditorActionListener((v, actionId, event) -> {
                              if (actionId == android.view.inputmethod.EditorInfo.IME_ACTION_GO ||
                                  actionId == android.view.inputmethod.EditorInfo.IME_ACTION_DONE) {
                                  String input = homeSearch.getText().toString();
                                  hideHomePage();
                                  loadUrl(input);
                                  return true;
                              }
                              return false;
                          });
                      }
                  }
                  homeView.setVisibility(View.VISIBLE);
                  urlBar.setText("");
                  lockIcon.setVisibility(View.GONE);
              }

              private void hideHomePage() {
                  androidx.coordinatorlayout.widget.CoordinatorLayout container = findViewById(R.id.root_layout);
                  android.view.View homeView = container.findViewWithTag(HOME_PAGE_TAG);
                  if (homeView != null) homeView.setVisibility(View.GONE);
                  geckoView.setVisibility(View.VISIBLE);
              }

              private void toggleDesktopMode() {
                  isDesktopMode = !isDesktopMode;
                  for (BrowserTab tab : tabs) {
                      tab.getSession().getSettings().setUserAgentOverride(getGeckoUA());
                      tab.getSession().getSettings().setViewportMode(isDesktopMode
                          ? GeckoSessionSettings.VIEWPORT_MODE_DESKTOP
                          : GeckoSessionSettings.VIEWPORT_MODE_MOBILE);
                      tab.getSession().reload();
                  }
                  Toast.makeText(this, isDesktopMode ? "Desktop mode on" : "Mobile mode on", Toast.LENGTH_SHORT).show();
              }

              private void showBrowserMenu(View anchor) {
                  PopupMenu popup = new PopupMenu(this, anchor);
                  popup.getMenuInflater().inflate(R.menu.browser_menu, popup.getMenu());
                  android.view.MenuItem dmItem = popup.getMenu().findItem(R.id.menu_desktop_mode);
                  if (dmItem != null) dmItem.setTitle(isDesktopMode ? "Mobile mode" : "Desktop mode");
                  popup.setOnMenuItemClickListener(item -> {
                      int id = item.getItemId();
                      if (id == R.id.menu_new_tab) {
                          openNewTab("about:home"); return true;
                      } else if (id == R.id.menu_new_incognito) {
                          openNewTab("https://www.google.com"); return true;
                      } else if (id == R.id.menu_refresh) {
                          if (currentTabIndex < tabs.size()) tabs.get(currentTabIndex).getSession().reload(); return true;
                      } else if (id == R.id.menu_close_tab) {
                          closeTab(currentTabIndex); return true;
                      } else if (id == R.id.menu_desktop_mode) {
                          toggleDesktopMode(); return true;
                      } else if (id == R.id.menu_extensions) {
                          startActivity(new Intent(this, ExtensionManagerActivity.class)); return true;
                      } else if (id == R.id.menu_find_in_page) {
                          Toast.makeText(this, "Find in page (coming soon)", Toast.LENGTH_SHORT).show(); return true;
                      } else if (id == R.id.menu_settings) {
                          showSettingsDialog(); return true;
                      }
                      return false;
                  });
                  popup.show();
              }

              private void showSettingsDialog() {
                  new AlertDialog.Builder(this)
                      .setTitle("Settings")
                      .setMessage("GeckoView Browser (Java Edition)\nDRM: Enabled (Widevine)\nExtensions: Supported (.zip / .xpi / URL)")
                      .setPositiveButton("OK", null)
                      .show();
              }
          }
