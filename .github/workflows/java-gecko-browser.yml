name: Build Java Gecko Browser

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Android build tools
        run: |
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -f "$SDKMANAGER" ]; then
            SDKMANAGER="${ANDROID_HOME}/cmdline-tools/$(ls ${ANDROID_HOME}/cmdline-tools | sort -V | tail -1)/bin/sdkmanager"
          fi
          yes | "$SDKMANAGER" --licenses || true
          "$SDKMANAGER" "build-tools;35.0.0" "platforms;android-35" "ndk;27.2.12479018" "cmake;3.22.1"

      - name: Create Java Gecko Browser project structure
        run: |
          mkdir -p JavaGeckoBrowser
          cd JavaGeckoBrowser

          echo '' | base64 -d > build.gradle

          echo '' | base64 -d > settings.gradle

          echo 'YW5kcm9pZC51c2VBbmRyb2lkWD10cnVlCmFuZHJvaWQuZW5hYmxlSmV0aWZpZXI9ZmFsc2UKb3JnLmdyYWRsZS5qdm1hcmdzPS1YbXg0ZyAtWFg6TWF4TWV0YXNwYWNlU2l6ZT01MTJtCg==' | base64 -d > gradle.properties

          mkdir -p app/src/main/java/com/personal/javageckobrowser
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/menu
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/assets/extensions
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi

          echo "" | base64 -d > app/src/main/res/mipmap-mdpi/ic_launcher.png
          echo "" | base64 -d > app/src/main/res/mipmap-hdpi/ic_launcher.png
          echo "" | base64 -d > app/src/main/res/mipmap-xhdpi/ic_launcher.png
          echo "" | base64 -d > app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          echo "" | base64 -d > app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

          echo '' | base64 -d > app/build.gradle

          echo '' | base64 -d > app/src/main/AndroidManifest.xml

          echo '' | base64 -d > app/src/main/java/com/personal/javageckobrowser/BaseActivity.java

          echo '' | base64 -d > app/src/main/java/com/personal/javageckobrowser/MainActivity.java

          echo '' | base64 -d > app/src/main/java/com/personal/javageckobrowser/BrowserTab.java

          echo 'cGFja2FnZSBjb20ucGVyc29uYWwuamF2YWdlY2tvYnJvd3NlcjsKCmltcG9ydCBvcmcubW96aWxsYS5nZWNrb3ZpZXcuR2Vja29SdW50aW1lOwoKcHVibGljIGNsYXNzIEFwcFJ1bnRpbWUgewogICAgcHVibGljIHN0YXRpYyBHZWNrb1J1bnRpbWUgcnVudGltZTsKfQo=' | base64 -d > app/src/main/java/com/personal/javageckobrowser/AppRuntime.java

