          EXTXML

          # browser_menu.xml
          cat > app/src/main/res/menu/browser_menu.xml << 'MENUXML'
          <?xml version="1.0" encoding="utf-8"?>
          <menu xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:id="@+id/menu_new_tab" android:title="New Tab" />
              <item android:id="@+id/menu_close_tab" android:title="Close Tab" />
              <item android:id="@+id/menu_extensions" android:title="Extensions" />
              <item android:id="@+id/menu_settings" android:title="Settings" />
          </menu>
          MENUXML

          cat > app/src/main/res/values/themes.xml << 'THEMES'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.JavaGeckoBrowser" parent="Theme.MaterialComponents.DayNight.NoActionBar">
                  <item name="colorPrimary">#1A73E8</item>
                  <item name="colorPrimaryVariant">#1558B0</item>
                  <item name="colorOnPrimary">#FFFFFF</item>
                  <item name="android:statusBarColor">#1E1E1E</item>
              </style>
          </resources>
          THEMES

          cat > app/src/main/res/values/strings.xml << 'STRINGS'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Personal Browser Java</string>
          </resources>
          STRINGS

          cat > app/proguard-rules.pro << 'PROGUARD'
          -keep class org.mozilla.geckoview.** { *; }
          PROGUARD

      - name: Setup Gradle wrapper for Java project
        run: |
          cd JavaGeckoBrowser
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'WRAPPERPROPS'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.13-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          WRAPPERPROPS

      - name: Install Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: '8.13'

      - name: Build Java Gecko Browser Debug APK
        working-directory: JavaGeckoBrowser
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload Java Gecko Browser APK
        uses: actions/upload-artifact@v4
        with:
          name: JavaGeckoBrowser-debug-apk
          path: JavaGeckoBrowser/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build Java Gecko Browser Release APK (unsigned)
        working-directory: JavaGeckoBrowser
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Upload Java Release APK
        uses: actions/upload-artifact@v4
        with:
          name: JavaGeckoBrowser-release-unsigned-apk
          path: JavaGeckoBrowser/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
