          echo '' | base64 -d > app/src/main/res/layout/item_tab.xml

          echo 'PD94bWwgdmVyc2lvbj0iMS4wIiBlbmNvZGluZz0idXRmLTgiPz4KPHNoYXBlIHhtbG5zOmFuZHJvaWQ9Imh0dHA6Ly9zY2hlbWFzLmFuZHJvaWQuY29tL2Fway9yZXMvYW5kcm9pZCIKICAgIGFuZHJvaWQ6c2hhcGU9Im92YWwiPgogICAgPHNvbGlkIGFuZHJvaWQ6Y29sb3I9IiM1RjYzNjgiLz4KPC9zaGFwZT4K' | base64 -d > app/src/main/res/drawable/favicon_dot.xml

          echo '' | base64 -d > app/src/main/res/drawable/ic_close.xml

          echo 'PD94bWwgdmVyc2lvbj0iMS4wIiBlbmNvZGluZz0idXRmLTgiPz4KPHNoYXBlIHhtbG5zOmFuZHJvaWQ9Imh0dHA6Ly9zY2hlbWFzLmFuZHJvaWQuY29tL2Fway9yZXMvYW5kcm9pZCIKICAgIGFuZHJvaWQ6c2hhcGU9InJlY3RhbmdsZSI+CiAgICA8Y29ybmVycyBhbmRyb2lkOnJhZGl1cz0iMjBkcCIvPgogICAgPHNvbGlkIGFuZHJvaWQ6Y29sb3I9IiMzQzQwNDMiLz4KPC9zaGFwZT4K' | base64 -d > app/src/main/res/drawable/url_bar_bg.xml

          echo '' | base64 -d > app/src/main/res/drawable/tab_item_bg.xml

          echo '' | base64 -d > app/src/main/res/layout/item_extension.xml

          echo '' | base64 -d > app/src/main/res/layout/activity_extension_manager.xml

          echo '' | base64 -d > app/src/main/res/menu/browser_menu.xml

