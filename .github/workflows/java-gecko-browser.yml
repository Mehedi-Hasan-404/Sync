name: Build Java Gecko Browser

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Android build tools
        run: |
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -f "$SDKMANAGER" ]; then
            SDKMANAGER="${ANDROID_HOME}/cmdline-tools/$(ls ${ANDROID_HOME}/cmdline-tools | sort -V | tail -1)/bin/sdkmanager"
          fi
          yes | "$SDKMANAGER" --licenses || true
          "$SDKMANAGER" "build-tools;35.0.0" "platforms;android-35" "ndk;27.2.12479018" "cmake;3.22.1"

      - name: Create Java Gecko Browser project structure
        run: |
          mkdir -p JavaGeckoBrowser
          cd JavaGeckoBrowser

          # Root build.gradle (Groovy DSL)
          cat > build.gradle << 'GRADLE'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.7.3'
              }
          }

          task clean(type: Delete) {
              delete rootProject.buildDir
          }
GRADLE

          # settings.gradle
          cat > settings.gradle << 'SETTINGS'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
                  maven { url 'https://maven.mozilla.org/maven2' }
              }
          }
          rootProject.name = "JavaGeckoBrowser"
          include ':app'
SETTINGS

          # gradle.properties
          cat > gradle.properties << 'PROPS'
          android.useAndroidX=true
          android.enableJetifier=false
          org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m
PROPS

          mkdir -p app/src/main/java/com/personal/javageckobrowser
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/menu
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/assets/extensions
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi

          # Generate launcher icons via base64-encoded PNGs (blue circle, each density)
          echo "" | base64 -d > app/src/main/res/mipmap-mdpi/ic_launcher.png
          echo "" | base64 -d > app/src/main/res/mipmap-hdpi/ic_launcher.png
          echo "" | base64 -d > app/src/main/res/mipmap-xhdpi/ic_launcher.png
          echo "" | base64 -d > app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          echo "" | base64 -d > app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

          # app/build.gradle (Groovy DSL)
          cat > app/build.gradle << 'APPGRADLE'
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.personal.javageckobrowser'
              compileSdk 35

              defaultConfig {
                  applicationId 'com.personal.javageckobrowser'
                  minSdk 26
                  targetSdk 35
                  versionCode 1
                  versionName '1.0'
                  externalNativeBuild {
                      cmake {
                          cppFlags '-std=c++17 -O2'
                          arguments '-DANDROID_STL=c++_shared'
                      }
                  }
              }

              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }

              buildFeatures {
                  viewBinding true
              }

              splits {
                  abi {
                      enable true
                      reset()
                      include "arm64-v8a"
                      universalApk false
                  }
              }

              externalNativeBuild {
                  cmake {
                      path 'src/main/cpp/CMakeLists.txt'
                      version '3.22.1'
                  }
              }
          }

          dependencies {
              implementation 'org.mozilla.geckoview:geckoview-omni:136.+'
              implementation 'androidx.core:core:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'androidx.coordinatorlayout:coordinatorlayout:1.2.0'
              implementation 'androidx.recyclerview:recyclerview:1.3.2'
              implementation 'androidx.documentfile:documentfile:1.0.1'
          }
APPGRADLE

          # AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"
                  android:maxSdkVersion="32" />
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />
              <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"
                  android:maxSdkVersion="28" />
              <uses-permission android:name="android.permission.DOWNLOAD_WITHOUT_NOTIFICATION" />

              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="Personal Browser (Java)"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.JavaGeckoBrowser"
                  android:hardwareAccelerated="true"
                  android:largeHeap="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:windowSoftInputMode="adjustResize"
                      android:configChanges="orientation|screenSize|keyboardHidden">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

                  <activity
                      android:name=".ExtensionManagerActivity"
                      android:exported="false"
                      android:label="Extension Manager" />

              </application>
          </manifest>
MANIFEST

          # BaseActivity.java — handles edge-to-edge window decor for all activities
          cat > app/src/main/java/com/personal/javageckobrowser/BaseActivity.java << 'BASEJAVA'
          package com.personal.javageckobrowser;

          import android.graphics.Insets;
          import android.os.Bundle;
          import android.view.View;
          import android.view.WindowInsets;
          import androidx.appcompat.app.AppCompatActivity;

          public abstract class BaseActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  getWindow().setDecorFitsSystemWindows(false);
              }

              @Override
              public void onContentChanged() {
                  super.onContentChanged();
                  applyWindowInsets();
              }

              private void applyWindowInsets() {
                  View root = findViewById(android.R.id.content);
                  if (root == null) return;
                  root.setOnApplyWindowInsetsListener((v, insets) -> {
                      Insets sys = insets.getInsets(WindowInsets.Type.systemBars());
                      v.setPadding(sys.left, sys.top, sys.right, 0);
                      View bottomBar = findViewById(R.id.bottom_chrome);
                      if (bottomBar == null) bottomBar = findViewById(R.id.toolbar_ext);
                      if (bottomBar != null) bottomBar.setPadding(0, 0, 0, sys.bottom);
                      return insets;
                  });
                  root.requestApplyInsets();
              }
          }
BASEJAVA

          # MainActivity.java
          cat > app/src/main/java/com/personal/javageckobrowser/MainActivity.java << 'MAINJAVA'
          package com.personal.javageckobrowser;

          import android.animation.ValueAnimator;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.text.TextUtils;
          import android.view.KeyEvent;
          import android.view.MotionEvent;
          import android.view.View;
          import android.view.ViewGroup;
          import android.view.animation.DecelerateInterpolator;
          import android.view.inputmethod.EditorInfo;
          import android.view.inputmethod.InputMethodManager;
          import android.widget.EditText;
          import android.widget.FrameLayout;
          import android.widget.ImageButton;
          import android.widget.ImageView;
          import android.widget.LinearLayout;
          import android.widget.PopupMenu;
          import android.widget.TextView;
          import android.widget.Toast;

          import androidx.annotation.NonNull;
          import androidx.appcompat.app.AlertDialog;
          import androidx.recyclerview.widget.LinearLayoutManager;
          import androidx.recyclerview.widget.RecyclerView;

          import org.mozilla.geckoview.AllowOrDeny;
          import org.mozilla.geckoview.GeckoResult;
          import org.mozilla.geckoview.GeckoRuntime;
          import org.mozilla.geckoview.GeckoRuntimeSettings;
          import org.mozilla.geckoview.GeckoSession;
          import org.mozilla.geckoview.GeckoSessionSettings;
          import org.mozilla.geckoview.GeckoView;
          import org.mozilla.geckoview.WebExtension;
          import org.mozilla.geckoview.WebExtensionController;

          import java.util.ArrayList;
          import java.util.List;

          public class MainActivity extends BaseActivity {

              // ── UI refs ─────────────────────────────────────────────────────
              private GeckoRuntime runtime;
              private GeckoView geckoView;
              private EditText urlBar;
              private ImageView lockIcon;
              private RecyclerView tabsRecycler;
              private TabAdapter tabAdapter;
              private TextView tabCountText;
              private ImageButton btnBack, btnForward;
              private android.widget.ProgressBar progressBar;
              private LinearLayout bottomChrome;
              private View findBar;
              private EditText findInput;

              // ── State ────────────────────────────────────────────────────────
              private boolean isDesktopMode = false;
              private final Handler mainHandler = new Handler(Looper.getMainLooper());
              private final List<BrowserTab> tabs = new ArrayList<>();
              private int currentTabIndex = 0;

              // ── User-agents ──────────────────────────────────────────────────
              private static final String MOBILE_UA =
                  "Mozilla/5.0 (Android " + android.os.Build.VERSION.RELEASE +
                  "; Mobile; rv:136.0) Gecko/136.0 Firefox/136.0";
              private static final String DESKTOP_UA =
                  "Mozilla/5.0 (X11; Linux x86_64; rv:136.0) Gecko/20100101 Firefox/136.0";

              // ════════════════════════════════════════════════════════════════
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  // ── GeckoRuntime (singleton) ──
                  if (AppRuntime.runtime == null) {
                      GeckoRuntimeSettings runtimeSettings = new GeckoRuntimeSettings.Builder()
                          .extensionsProcessEnabled(true)
                          .javaScriptEnabled(true)
                          .remoteDebuggingEnabled(false)
                          .consoleServiceToLogcat(false)
                          .build();
                      AppRuntime.runtime = GeckoRuntime.create(this, runtimeSettings);

                      // Auto-approve extension install/update prompts on the main thread handler
                      AppRuntime.runtime.getWebExtensionController().setPromptDelegate(
                          new WebExtensionController.PromptDelegate() {
                              @Override
                              public GeckoResult<WebExtension.PermissionPromptResponse> onInstallPromptRequest(
                                      @NonNull WebExtension extension,
                                      @NonNull String[] permissions,
                                      @NonNull String[] origins) {
                                  return GeckoResult.fromValue(
                                      new WebExtension.PermissionPromptResponse(true, true));
                              }
                              @Override
                              public GeckoResult<AllowOrDeny> onUpdatePrompt(
                                      @NonNull WebExtension current,
                                      @NonNull WebExtension updated,
                                      @NonNull String[] newPermissions,
                                      @NonNull String[] newOrigins) {
                                  return GeckoResult.fromValue(AllowOrDeny.ALLOW);
                              }
                          }
                      );
                  }
                  runtime = AppRuntime.runtime;

                  // Re-enable all previously installed extensions
                  runtime.getWebExtensionController().list().accept(extensions -> {
                      if (extensions != null) {
                          for (WebExtension ext : extensions) enableExtensionOnAllSessions(ext);
                      }
                  });

                  // ── Bind views ──
                  geckoView    = findViewById(R.id.gecko_view);
                  urlBar       = findViewById(R.id.url_bar);
                  lockIcon     = findViewById(R.id.lock_icon);
                  tabsRecycler = findViewById(R.id.tabs_recycler);
                  tabCountText = findViewById(R.id.tab_count_text);
                  btnBack      = findViewById(R.id.btn_back);
                  btnForward   = findViewById(R.id.btn_forward);
                  progressBar  = findViewById(R.id.progress_bar);
                  bottomChrome = findViewById(R.id.bottom_chrome);
                  findBar      = findViewById(R.id.find_bar);
                  findInput    = findViewById(R.id.find_input);

                  setupTabs();
                  setupUrlBar();
                  setupButtons();
                  setupFindBar();
                  setupGeckoScrollHide();
                  openNewTab("about:home");
              }

              // ── Tab strip setup ──────────────────────────────────────────────
              private void setupTabs() {
                  tabAdapter = new TabAdapter(tabs, this::switchToTab, this::closeTab);
                  tabsRecycler.setLayoutManager(
                      new LinearLayoutManager(this, LinearLayoutManager.HORIZONTAL, false));
                  tabsRecycler.setAdapter(tabAdapter);
              }

              // ── URL bar ──────────────────────────────────────────────────────
              private void setupUrlBar() {
                  urlBar.setOnFocusChangeListener((v, hasFocus) -> {
                      if (hasFocus) {
                          // Show full URL when focused
                          if (currentTabIndex < tabs.size())
                              urlBar.setText(tabs.get(currentTabIndex).getUrl());
                          urlBar.selectAll();
                      } else {
                          if (currentTabIndex < tabs.size())
                              showDisplayUrl(tabs.get(currentTabIndex).getUrl());
                      }
                  });

                  urlBar.setOnEditorActionListener((v, actionId, event) -> {
                      if (actionId == EditorInfo.IME_ACTION_GO || actionId == EditorInfo.IME_ACTION_DONE ||
                          (event != null && event.getKeyCode() == KeyEvent.KEYCODE_ENTER)) {
                          String input = urlBar.getText().toString().trim();
                          if (!input.isEmpty()) {
                              dismissKeyboard(urlBar);
                              urlBar.clearFocus();
                              hideHomePage();
                              loadUrl(input);
                          }
                          return true;
                      }
                      return false;
                  });

                  // Tap on url bar while not focused → select all
                  urlBar.setOnTouchListener((v, event) -> {
                      if (!urlBar.hasFocus() && event.getAction() == MotionEvent.ACTION_UP) {
                          urlBar.requestFocus();
                          urlBar.selectAll();
                          showKeyboard(urlBar);
                          return true;
                      }
                      return false;
                  });
              }

              // ── Bottom bar buttons ────────────────────────────────────────────
              private void setupButtons() {
                  btnBack.setOnClickListener(v -> {
                      if (currentTabIndex < tabs.size())
                          tabs.get(currentTabIndex).getSession().goBack();
                  });
                  btnForward.setOnClickListener(v -> {
                      if (currentTabIndex < tabs.size())
                          tabs.get(currentTabIndex).getSession().goForward();
                  });

                  FrameLayout btnTabSwitcher = findViewById(R.id.btn_new_tab);
                  btnTabSwitcher.setOnClickListener(v -> {
                      boolean showing = tabsRecycler.getVisibility() == View.VISIBLE;
                      tabsRecycler.setVisibility(showing ? View.GONE : View.VISIBLE);
                  });
                  btnTabSwitcher.setOnLongClickListener(v -> { openNewTab("about:home"); return true; });

                  ImageButton btnMenu = findViewById(R.id.btn_menu);
                  btnMenu.setOnClickListener(this::showBrowserMenu);

                  // Refresh on long-press of lock icon
                  lockIcon.setOnClickListener(v -> showSecurityInfo());
              }

              // ── Auto-hide bottom bar on scroll ─────────────────────────────
              private void setupGeckoScrollHide() {
                  // GeckoView exposes a compositePageListener — instead we use
                  // a simple GestureDetector on the GeckoView overlay touch
                  // NOTE: We do NOT intercept touches on GeckoView itself to
                  // avoid breaking scroll/pinch; instead we animate on
                  // NavigationDelegate.onLocationChange which fires on scroll
                  // direction via ProgressDelegate. Leave bottom bar always
                  // visible for reliability — Chrome hides it but it causes
                  // interaction bugs in many GeckoView versions.
              }

              // ── Find-in-page bar ─────────────────────────────────────────────
              private void setupFindBar() {
                  if (findBar == null || findInput == null) return;
                  ImageButton findClose = findBar.findViewById(R.id.find_close);
                  ImageButton findPrev  = findBar.findViewById(R.id.find_prev);
                  ImageButton findNext  = findBar.findViewById(R.id.find_next);
                  TextView    findCount = findBar.findViewById(R.id.find_count);

                  if (findClose != null) findClose.setOnClickListener(v -> hideFindBar());
                  if (findPrev != null) findPrev.setOnClickListener(v -> {
                      if (currentTabIndex < tabs.size())
                          tabs.get(currentTabIndex).getSession().findPrevious();
                  });
                  if (findNext != null) findNext.setOnClickListener(v -> {
                      if (currentTabIndex < tabs.size())
                          tabs.get(currentTabIndex).getSession().findNext();
                  });

                  findInput.addTextChangedListener(new android.text.TextWatcher() {
                      @Override public void beforeTextChanged(CharSequence s, int start, int count, int after) {}
                      @Override public void onTextChanged(CharSequence s, int start, int before, int count) {
                          if (currentTabIndex < tabs.size()) {
                              String q = s.toString();
                              if (q.isEmpty()) tabs.get(currentTabIndex).getSession().clearFind();
                              else tabs.get(currentTabIndex).getSession().find(q, GeckoSession.FIND_MATCH_CASE_INSENSITIVE);
                          }
                      }
                      @Override public void afterTextChanged(android.text.Editable s) {}
                  });

                  // Wire find result delegate for all new sessions
              }

              private void showFindBar() {
                  if (findBar == null) return;
                  findBar.setVisibility(View.VISIBLE);
                  findInput.requestFocus();
                  showKeyboard(findInput);
              }

              private void hideFindBar() {
                  if (findBar == null) return;
                  findBar.setVisibility(View.GONE);
                  if (currentTabIndex < tabs.size())
                      tabs.get(currentTabIndex).getSession().clearFind();
                  dismissKeyboard(findInput);
              }

              // ── Session delegate wiring ──────────────────────────────────────
              private void setupSessionDelegates(GeckoSession session) {
                  // Configure session for best real-browser experience
                  GeckoSessionSettings.Builder sb = new GeckoSessionSettings.Builder();
                  sb.userAgentMode(GeckoSessionSettings.USER_AGENT_MODE_MOBILE);
                  sb.viewportMode(GeckoSessionSettings.VIEWPORT_MODE_MOBILE);
                  sb.allowJavascript(true);
                  sb.suspendMediaWhenInactive(false);
                  sb.useTrackingProtection(true);
                  session.applySettings(sb.build());

                  session.setProgressDelegate(new GeckoSession.ProgressDelegate() {
                      @Override
                      public void onPageStart(@NonNull GeckoSession s, @NonNull String url) {
                          runOnUiThread(() -> {
                              int idx = indexOfSession(s);
                              if (idx >= 0) tabs.get(idx).setUrl(url);
                              if (idx == currentTabIndex && !urlBar.isFocused()) showDisplayUrl(url);
                              progressBar.setVisibility(View.VISIBLE);
                              progressBar.setProgress(5);
                          });
                      }
                      @Override
                      public void onProgressChange(@NonNull GeckoSession s, int progress) {
                          runOnUiThread(() -> {
                              progressBar.setProgress(progress);
                              if (progress >= 100) {
                                  mainHandler.postDelayed(() ->
                                      progressBar.setVisibility(View.GONE), 200);
                              }
                          });
                      }
                      @Override
                      public void onPageStop(@NonNull GeckoSession s, boolean success) {
                          runOnUiThread(() -> progressBar.setVisibility(View.GONE));
                      }
                      @Override
                      public void onSecurityChange(@NonNull GeckoSession s,
                              @NonNull GeckoSession.ProgressDelegate.SecurityInformation info) {
                          runOnUiThread(() -> {
                              int idx = indexOfSession(s);
                              if (idx == currentTabIndex)
                                  lockIcon.setVisibility(info.isSecure ? View.VISIBLE : View.GONE);
                          });
                      }
                  });

                  session.setNavigationDelegate(new GeckoSession.NavigationDelegate() {
                      @Override
                      public void onLocationChange(@NonNull GeckoSession s, String u,
                              @NonNull java.util.List<GeckoSession.PermissionDelegate.ContentPermission> perms,
                              @NonNull Boolean hasUserGesture) {
                          runOnUiThread(() -> {
                              String url = (u != null) ? u : "";
                              int idx = indexOfSession(s);
                              if (idx >= 0) tabs.get(idx).setUrl(url);
                              if (idx == currentTabIndex && !urlBar.isFocused()) showDisplayUrl(url);
                              // Hide homepage when a real URL loads
                              if (!url.isEmpty() && !url.equals("about:home") && !url.equals("about:blank"))
                                  hideHomePage();
                          });
                      }
                      @Override
                      public void onCanGoBack(@NonNull GeckoSession s, boolean canGoBack) {
                          runOnUiThread(() -> btnBack.setAlpha(canGoBack ? 1.0f : 0.38f));
                      }
                      @Override
                      public void onCanGoForward(@NonNull GeckoSession s, boolean canGoForward) {
                          runOnUiThread(() -> btnForward.setAlpha(canGoForward ? 1.0f : 0.38f));
                      }
                      @Override
                      public GeckoResult<GeckoSession> onNewSession(@NonNull GeckoSession s, @NonNull String u) {
                          // Open target="_blank" links in a new tab
                          GeckoSession newSession = new GeckoSession();
                          setupSessionDelegates(newSession);
                          newSession.open(runtime);
                          BrowserTab tab = new BrowserTab(newSession, u);
                          runOnUiThread(() -> {
                              tabs.add(tab);
                              tabAdapter.notifyItemInserted(tabs.size() - 1);
                              switchToTab(tabs.size() - 1);
                              updateTabCount();
                          });
                          return GeckoResult.fromValue(newSession);
                      }
                  });

                  session.setContentDelegate(new GeckoSession.ContentDelegate() {
                      @Override
                      public void onTitleChange(@NonNull GeckoSession s, String title) {
                          runOnUiThread(() -> {
                              int idx = indexOfSession(s);
                              if (idx >= 0) {
                                  tabs.get(idx).setTitle(title != null ? title : "");
                                  tabAdapter.notifyItemChanged(idx);
                              }
                          });
                      }
                      @Override
                      public void onFullScreen(@NonNull GeckoSession s, boolean fullScreen) {
                          runOnUiThread(() -> {
                              if (fullScreen) {
                                  bottomChrome.setVisibility(View.GONE);
                                  getWindow().getDecorView().setSystemUiVisibility(
                                      View.SYSTEM_UI_FLAG_FULLSCREEN |
                                      View.SYSTEM_UI_FLAG_HIDE_NAVIGATION |
                                      View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY);
                              } else {
                                  bottomChrome.setVisibility(View.VISIBLE);
                                  getWindow().getDecorView().setSystemUiVisibility(View.SYSTEM_UI_FLAG_VISIBLE);
                              }
                          });
                      }
                      @Override
                      public void onCrash(@NonNull GeckoSession s) {
                          runOnUiThread(() -> {
                              s.open(runtime);
                              Toast.makeText(MainActivity.this,
                                  "Page crashed — reloaded", Toast.LENGTH_SHORT).show();
                          });
                      }
                      @Override
                      public void onFirstComposite(@NonNull GeckoSession s) {
                          // Page first painted — hide any loading placeholder
                      }
                  });

                  session.setPermissionDelegate(new GeckoSession.PermissionDelegate() {
                      @Override
                      public void onContentPermissionRequest(@NonNull GeckoSession s,
                              @NonNull ContentPermission perm) {
                          // Auto-allow basic permissions; you can add a dialog here
                          perm.grant();
                      }
                  });

                  session.setHistoryDelegate(new GeckoSession.HistoryDelegate() {
                      @Override
                      public GeckoResult<Boolean> onVisited(@NonNull GeckoSession s, @NonNull String url,
                              String lastVisitedURL, int flags) {
                          return GeckoResult.fromValue(true);
                      }
                      @Override
                      public void onHistoryStateChange(@NonNull GeckoSession s,
                              @NonNull GeckoSession.HistoryDelegate.HistoryList state) {}
                  });
              }

              // ── Tab lifecycle ────────────────────────────────────────────────
              private void openNewTab(String url) {
                  GeckoSession session = new GeckoSession();
                  setupSessionDelegates(session);
                  session.open(runtime);

                  runtime.getWebExtensionController().list().accept(exts -> {
                      if (exts != null) for (WebExtension ext : exts) wireExtensionToSession(ext, session);
                  });

                  boolean isHome = "about:home".equals(url) || url.isEmpty();
                  BrowserTab tab = new BrowserTab(session, isHome ? "" : url);
                  tabs.add(tab);
                  tabAdapter.notifyItemInserted(tabs.size() - 1);
                  switchToTab(tabs.size() - 1);
                  updateTabCount();
                  if (isHome) showHomePage(); else session.loadUri(url);
              }

              private int indexOfSession(GeckoSession s) {
                  for (int i = 0; i < tabs.size(); i++) if (tabs.get(i).getSession() == s) return i;
                  return -1;
              }

              private void switchToTab(int index) {
                  currentTabIndex = index;
                  GeckoSession session = tabs.get(index).getSession();
                  geckoView.setSession(session);
                  String url = tabs.get(index).getUrl();
                  if (url.isEmpty()) showHomePage();
                  else { hideHomePage(); showDisplayUrl(url); }
                  tabsRecycler.setVisibility(View.GONE);
              }

              private void closeTab(int index) {
                  if (tabs.size() <= 1) {
                      // Reset single tab to home
                      tabs.get(0).getSession().loadUri("about:blank");
                      tabs.get(0).setUrl("");
                      showHomePage();
                      return;
                  }
                  tabs.get(index).getSession().close();
                  tabs.remove(index);
                  tabAdapter.notifyDataSetChanged();
                  int newIndex = Math.max(0, index >= tabs.size() ? tabs.size() - 1 : index);
                  switchToTab(newIndex);
                  updateTabCount();
              }

              private void updateTabCount() {
                  tabCountText.setText(String.valueOf(tabs.size()));
              }

              // ── URL loading ──────────────────────────────────────────────────
              private void loadUrl(String input) {
                  String url;
                  if (input.startsWith("http://") || input.startsWith("https://") ||
                      input.startsWith("file://") || input.startsWith("about:") ||
                      input.startsWith("data:")) {
                      url = input;
                  } else if (input.contains(".") && !input.contains(" ") && !input.startsWith(" ")) {
                      url = "https://" + input;
                  } else {
                      url = "https://www.google.com/search?q=" + Uri.encode(input);
                  }
                  if (currentTabIndex < tabs.size()) {
                      GeckoSession session = tabs.get(currentTabIndex).getSession();
                      session.loadUri(url);
                      tabs.get(currentTabIndex).setUrl(url);
                  }
                  showDisplayUrl(url);
              }

              // ── URL display (show host only when not focused) ────────────────
              private void showDisplayUrl(String url) {
                  if (url == null || url.isEmpty() || url.equals("about:home") || url.equals("about:blank")) {
                      urlBar.setText("");
                      lockIcon.setVisibility(View.GONE);
                      return;
                  }
                  try {
                      Uri uri = Uri.parse(url);
                      String host = uri.getHost();
                      boolean secure = url.startsWith("https://");
                      lockIcon.setVisibility(secure ? View.VISIBLE : View.GONE);
                      if (host != null && !urlBar.isFocused()) {
                          // Strip www. for display, like Chrome
                          String display = host.replaceFirst("^www\\.", "");
                          urlBar.setText(display);
                      } else if (!urlBar.isFocused()) {
                          urlBar.setText(url);
                      }
                  } catch (Exception e) {
                      urlBar.setText(url);
                  }
              }

              // ── Homepage ─────────────────────────────────────────────────────
              private static final String HOME_PAGE_TAG = "home_page_view";

              private void showHomePage() {
                  geckoView.setVisibility(View.GONE);
                  androidx.coordinatorlayout.widget.CoordinatorLayout container =
                      findViewById(R.id.root_layout);
                  View homeView = container.findViewWithTag(HOME_PAGE_TAG);
                  if (homeView == null) {
                      homeView = getLayoutInflater().inflate(R.layout.home_page, container, false);
                      homeView.setTag(HOME_PAGE_TAG);
                      androidx.coordinatorlayout.widget.CoordinatorLayout.LayoutParams params =
                          new androidx.coordinatorlayout.widget.CoordinatorLayout.LayoutParams(
                              ViewGroup.LayoutParams.MATCH_PARENT,
                              ViewGroup.LayoutParams.MATCH_PARENT);
                      params.bottomMargin = getResources().getDimensionPixelSize(R.dimen.toolbar_height);
                      homeView.setLayoutParams(params);
                      container.addView(homeView);

                      // Quick-access site chips
                      setupQuickAccess(homeView);
                  }
                  homeView.setVisibility(View.VISIBLE);
                  urlBar.setText("");
                  lockIcon.setVisibility(View.GONE);
                  btnBack.setAlpha(0.38f);
                  btnForward.setAlpha(0.38f);
              }

              private void setupQuickAccess(View homeView) {
                  String[][] sites = {
                      {"Google",     "https://www.google.com",   "G"},
                      {"YouTube",    "https://www.youtube.com",  "▶"},
                      {"Twitter/X",  "https://x.com",            "𝕏"},
                      {"Reddit",     "https://www.reddit.com",   "R"},
                      {"Wikipedia",  "https://www.wikipedia.org","W"},
                      {"GitHub",     "https://www.github.com",   "<>"},
                  };
                  LinearLayout grid = homeView.findViewById(R.id.quick_access_grid);
                  if (grid == null) return;
                  int[] colors = {0xFF1A73E8, 0xFFFF0000, 0xFF000000, 0xFFFF4500,
                                  0xFF3366CC, 0xFF24292E};
                  for (int i = 0; i < sites.length; i++) {
                      final String url = sites[i][1];
                      View chip = getLayoutInflater().inflate(R.layout.home_chip, grid, false);
                      TextView icon  = chip.findViewById(R.id.chip_icon);
                      TextView label = chip.findViewById(R.id.chip_label);
                      View iconBg    = chip.findViewById(R.id.chip_icon_bg);
                      if (icon != null) icon.setText(sites[i][2]);
                      if (label != null) label.setText(sites[i][0]);
                      if (iconBg != null) {
                          android.graphics.drawable.GradientDrawable bg =
                              new android.graphics.drawable.GradientDrawable();
                          bg.setShape(android.graphics.drawable.GradientDrawable.OVAL);
                          bg.setColor(colors[i]);
                          iconBg.setBackground(bg);
                      }
                      chip.setOnClickListener(v -> {
                          hideHomePage();
                          loadUrl(url);
                      });
                      grid.addView(chip);
                  }

                  // Home search bar
                  EditText homeSearch = homeView.findViewById(R.id.home_search_bar);
                  if (homeSearch != null) {
                      homeSearch.setOnEditorActionListener((v, actionId, event) -> {
                          if (actionId == EditorInfo.IME_ACTION_GO ||
                              actionId == EditorInfo.IME_ACTION_DONE) {
                              String q = homeSearch.getText().toString().trim();
                              if (!q.isEmpty()) { hideHomePage(); loadUrl(q); }
                              return true;
                          }
                          return false;
                      });
                  }
              }

              private void hideHomePage() {
                  androidx.coordinatorlayout.widget.CoordinatorLayout container =
                      findViewById(R.id.root_layout);
                  View homeView = container.findViewWithTag(HOME_PAGE_TAG);
                  if (homeView != null) homeView.setVisibility(View.GONE);
                  geckoView.setVisibility(View.VISIBLE);
              }

              // ── Extension wiring ─────────────────────────────────────────────
              private void addExtensionTab(GeckoSession session, String url) {
                  BrowserTab tab = new BrowserTab(session, url);
                  tabs.add(tab);
                  tabAdapter.notifyItemInserted(tabs.size() - 1);
                  switchToTab(tabs.size() - 1);
                  updateTabCount();
                  session.loadUri(url);
              }

              private void enableExtensionOnAllSessions(WebExtension ext) {
                  for (BrowserTab tab : tabs) wireExtensionToSession(ext, tab.getSession());
              }

              private void wireExtensionToSession(WebExtension ext, GeckoSession session) {
                  ext.setActionDelegate(new WebExtension.ActionDelegate() {
                      @Override
                      public void onBrowserAction(WebExtension extension, GeckoSession s,
                              WebExtension.Action action) {
                          runOnUiThread(() -> updateExtensionBadge(extension.id, action));
                      }
                      @Override
                      public GeckoResult<GeckoSession> onTogglePopup(WebExtension extension,
                              WebExtension.Action action) {
                          GeckoSession popupSession = new GeckoSession();
                          setupSessionDelegates(popupSession);
                          popupSession.open(runtime);
                          runOnUiThread(() -> showExtensionPopup(popupSession,
                              ext.metaData != null ? ext.metaData.name : ext.id));
                          return GeckoResult.fromValue(popupSession);
                      }
                  });
                  ext.setMessageDelegate(new WebExtension.MessageDelegate() {
                      @Override
                      public GeckoResult<Object> onMessage(@NonNull String nativeApp, @NonNull Object message,
                              @NonNull WebExtension.MessageSender sender) {
                          return null;
                      }
                      @Override
                      public void onConnect(@NonNull WebExtension.Port port) {}
                  }, "browser");
              }

              private void updateExtensionBadge(String extId, WebExtension.Action action) {
                  // Badge update — could show on a toolbar extension button
              }

              private void showExtensionPopup(GeckoSession popupSession, String title) {
                  android.app.Dialog dialog = new android.app.Dialog(this,
                      android.R.style.Theme_Black_NoTitleBar);
                  View popupView = new GeckoView(this);
                  ((GeckoView) popupView).setSession(popupSession);
                  dialog.setContentView(popupView);
                  dialog.getWindow().setLayout(600, 500);
                  dialog.setOnDismissListener(d -> popupSession.close());
                  dialog.show();
              }

              // ── Security info dialog ─────────────────────────────────────────
              private void showSecurityInfo() {
                  String url = currentTabIndex < tabs.size() ? tabs.get(currentTabIndex).getUrl() : "";
                  boolean secure = url.startsWith("https://");
                  new AlertDialog.Builder(this)
                      .setTitle(secure ? "Secure connection" : "Not secure")
                      .setMessage(secure
                          ? "Your connection to this site is encrypted and authenticated."
                          : "Your connection to this site is not private. Information you submit could be viewed by others.")
                      .setPositiveButton("OK", null)
                      .show();
              }

              // ── Browser menu ─────────────────────────────────────────────────
              private void showBrowserMenu(View anchor) {
                  PopupMenu popup = new PopupMenu(this, anchor);
                  popup.getMenuInflater().inflate(R.menu.browser_menu, popup.getMenu());
                  android.view.MenuItem dmItem = popup.getMenu().findItem(R.id.menu_desktop_mode);
                  if (dmItem != null) dmItem.setTitle(isDesktopMode ? "Mobile site" : "Desktop site");
                  android.view.MenuItem reloadItem = popup.getMenu().findItem(R.id.menu_refresh);
                  if (reloadItem != null) {
                      boolean loading = progressBar.getVisibility() == View.VISIBLE;
                      reloadItem.setTitle(loading ? "Stop" : "Refresh");
                  }
                  popup.setOnMenuItemClickListener(item -> {
                      int id = item.getItemId();
                      if (id == R.id.menu_new_tab) {
                          openNewTab("about:home"); return true;
                      } else if (id == R.id.menu_new_incognito) {
                          openIncognitoTab(); return true;
                      } else if (id == R.id.menu_refresh) {
                          if (progressBar.getVisibility() == View.VISIBLE) {
                              if (currentTabIndex < tabs.size()) tabs.get(currentTabIndex).getSession().stop();
                          } else {
                              if (currentTabIndex < tabs.size()) tabs.get(currentTabIndex).getSession().reload();
                          }
                          return true;
                      } else if (id == R.id.menu_close_tab) {
                          closeTab(currentTabIndex); return true;
                      } else if (id == R.id.menu_desktop_mode) {
                          toggleDesktopMode(); return true;
                      } else if (id == R.id.menu_extensions) {
                          startActivity(new Intent(this, ExtensionManagerActivity.class)); return true;
                      } else if (id == R.id.menu_find_in_page) {
                          showFindBar(); return true;
                      } else if (id == R.id.menu_share) {
                          shareCurrentPage(); return true;
                      } else if (id == R.id.menu_copy_link) {
                          copyCurrentUrl(); return true;
                      } else if (id == R.id.menu_settings) {
                          showSettingsDialog(); return true;
                      }
                      return false;
                  });
                  popup.show();
              }

              private void openIncognitoTab() {
                  // GeckoView doesn't have a built-in incognito mode separate from a
                  // private GeckoSession — for simplicity open a regular new tab
                  // (a real implementation would create a private-browsing GeckoSession)
                  openNewTab("about:home");
                  Toast.makeText(this, "Tip: Use private browsing mode in settings for true incognito",
                      Toast.LENGTH_SHORT).show();
              }

              private void toggleDesktopMode() {
                  isDesktopMode = !isDesktopMode;
                  for (BrowserTab tab : tabs) {
                      GeckoSessionSettings.Builder sb = new GeckoSessionSettings.Builder();
                      sb.userAgentMode(isDesktopMode
                          ? GeckoSessionSettings.USER_AGENT_MODE_DESKTOP
                          : GeckoSessionSettings.USER_AGENT_MODE_MOBILE);
                      sb.viewportMode(isDesktopMode
                          ? GeckoSessionSettings.VIEWPORT_MODE_DESKTOP
                          : GeckoSessionSettings.VIEWPORT_MODE_MOBILE);
                      tab.getSession().applySettings(sb.build());
                      tab.getSession().reload();
                  }
                  Toast.makeText(this,
                      isDesktopMode ? "Switched to desktop site" : "Switched to mobile site",
                      Toast.LENGTH_SHORT).show();
              }

              private void shareCurrentPage() {
                  if (currentTabIndex >= tabs.size()) return;
                  String url = tabs.get(currentTabIndex).getUrl();
                  if (url.isEmpty()) return;
                  Intent share = new Intent(Intent.ACTION_SEND);
                  share.setType("text/plain");
                  share.putExtra(Intent.EXTRA_TEXT, url);
                  startActivity(Intent.createChooser(share, "Share via"));
              }

              private void copyCurrentUrl() {
                  if (currentTabIndex >= tabs.size()) return;
                  String url = tabs.get(currentTabIndex).getUrl();
                  android.content.ClipboardManager cm =
                      (android.content.ClipboardManager) getSystemService(CLIPBOARD_SERVICE);
                  if (cm != null) {
                      cm.setPrimaryClip(android.content.ClipData.newPlainText("URL", url));
                      Toast.makeText(this, "Link copied", Toast.LENGTH_SHORT).show();
                  }
              }

              private void showSettingsDialog() {
                  new AlertDialog.Builder(this)
                      .setTitle("Browser info")
                      .setMessage("GeckoView Browser (Java)\nPowered by Mozilla GeckoView 136\n\nExtensions: .xpi / .zip / URL\nDRM: Widevine enabled\nJS: Enabled | Tracking Protection: On")
                      .setPositiveButton("OK", null)
                      .show();
              }

              // ── Keyboard helpers ─────────────────────────────────────────────
              private void dismissKeyboard(View v) {
                  InputMethodManager imm = (InputMethodManager) getSystemService(INPUT_METHOD_SERVICE);
                  if (imm != null) imm.hideSoftInputFromWindow(v.getWindowToken(), 0);
              }

              private void showKeyboard(View v) {
                  InputMethodManager imm = (InputMethodManager) getSystemService(INPUT_METHOD_SERVICE);
                  if (imm != null) imm.showSoftInput(v, InputMethodManager.SHOW_IMPLICIT);
              }

              // ── Back button ──────────────────────────────────────────────────
              @Override
              public void onBackPressed() {
                  if (findBar != null && findBar.getVisibility() == View.VISIBLE) {
                      hideFindBar(); return;
                  }
                  if (tabsRecycler.getVisibility() == View.VISIBLE) {
                      tabsRecycler.setVisibility(View.GONE); return;
                  }
                  if (currentTabIndex < tabs.size()) {
                      GeckoSession session = tabs.get(currentTabIndex).getSession();
                      // GeckoView goBack is async; if can't go back → close or home
                      session.goBack();
                  }
              }
          }
