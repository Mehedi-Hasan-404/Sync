          # ExtensionManagerActivity.java
          cat > app/src/main/java/com/personal/javageckobrowser/ExtensionManagerActivity.java << 'EXTJAVA'
          package com.personal.javageckobrowser;

          import android.app.Activity;
          import android.content.Intent;
          import android.database.Cursor;
          import android.net.Uri;
          import android.os.Bundle;
          import android.provider.OpenableColumns;
          import android.view.LayoutInflater;
          import android.view.View;
          import android.view.ViewGroup;
          import android.widget.*;

          import androidx.appcompat.app.AlertDialog;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.recyclerview.widget.LinearLayoutManager;
          import androidx.recyclerview.widget.RecyclerView;

          import org.mozilla.geckoview.GeckoResult;
          import org.mozilla.geckoview.GeckoRuntime;
          import org.mozilla.geckoview.WebExtension;

          import java.io.File;
          import java.io.FileOutputStream;
          import java.io.InputStream;
          import java.util.ArrayList;
          import java.util.List;
          import java.util.zip.ZipEntry;
          import java.util.zip.ZipInputStream;

          public class ExtensionManagerActivity extends BaseActivity {

              private static final int PICK_EXTENSION = 1001;

              // Holds live WebExtension objects — GeckoView is the source of truth
              private final List<WebExtension> installedExtensions = new ArrayList<>();
              private ExtensionAdapter extAdapter;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_extension_manager);

                  findViewById(R.id.btn_back_ext).setOnClickListener(v -> finish());

                  RecyclerView recycler = findViewById(R.id.extension_list);
                  extAdapter = new ExtensionAdapter();
                  recycler.setLayoutManager(new LinearLayoutManager(this));
                  recycler.setAdapter(extAdapter);

                  loadInstalledExtensions();

                  findViewById(R.id.btn_install_from_file).setOnClickListener(v -> {
                      Intent intent = new Intent(Intent.ACTION_GET_CONTENT);
                      intent.setType("*/*");
                      intent.putExtra(Intent.EXTRA_MIME_TYPES, new String[]{
                          "application/zip", "application/x-zip-compressed",
                          "application/octet-stream", "application/x-xpinstall"
                      });
                      startActivityForResult(intent, PICK_EXTENSION);
                  });
                  findViewById(R.id.btn_install_from_url).setOnClickListener(v -> showUrlInstallDialog());
              }

              // Query GeckoView directly — never rely on a local file scan
              private void loadInstalledExtensions() {
                  GeckoRuntime rt = AppRuntime.runtime;
                  if (rt == null) return;
                  rt.getWebExtensionController().list().accept(extensions -> runOnUiThread(() -> {
                      installedExtensions.clear();
                      if (extensions != null) installedExtensions.addAll(extensions);
                      extAdapter.notifyDataSetChanged();
                  }));
              }

              private void toggleExtension(WebExtension ext, boolean enable) {
                  GeckoRuntime rt = AppRuntime.runtime;
                  if (rt == null) return;
                  GeckoResult<WebExtension> op = enable
                      ? rt.getWebExtensionController().enable(ext, (int) WebExtension.Flags.NONE)
                      : rt.getWebExtensionController().disable(ext, (int) WebExtension.Flags.NONE);
                  op.accept(updated -> runOnUiThread(() -> {
                      int idx = indexOfExt(ext.id);
                      if (idx >= 0 && updated != null) {
                          installedExtensions.set(idx, updated);
                          extAdapter.notifyItemChanged(idx);
                      }
                      Toast.makeText(this, enable ? "Enabled" : "Disabled", Toast.LENGTH_SHORT).show();
                  }), err -> runOnUiThread(() ->
                      Toast.makeText(this, "Failed: " + (err != null ? err.getMessage() : "?"), Toast.LENGTH_SHORT).show()
                  ));
              }

              private void confirmUninstall(WebExtension ext) {
                  String name = (ext.metaData != null && ext.metaData.name != null) ? ext.metaData.name : ext.id;
                  new AlertDialog.Builder(this)
                      .setTitle("Uninstall extension")
                      .setMessage("Remove \"" + name + "\"?")
                      .setPositiveButton("Remove", (d, w) -> {
                          GeckoRuntime rt = AppRuntime.runtime;
                          if (rt == null) return;
                          rt.getWebExtensionController().uninstall(ext).accept(v -> runOnUiThread(() -> {
                              int idx = indexOfExt(ext.id);
                              if (idx >= 0) { installedExtensions.remove(idx); extAdapter.notifyItemRemoved(idx); }
                              // Clean up any extracted files
                              new File(getFilesDir(), "extensions/" + ext.id).delete();
                              Toast.makeText(this, "Uninstalled", Toast.LENGTH_SHORT).show();
                          }), err -> runOnUiThread(() ->
                              Toast.makeText(this, "Failed: " + (err != null ? err.getMessage() : "?"), Toast.LENGTH_SHORT).show()
                          ));
                      })
                      .setNegativeButton("Cancel", null).show();
              }

              private int indexOfExt(String id) {
                  for (int i = 0; i < installedExtensions.size(); i++)
                      if (installedExtensions.get(i).id.equals(id)) return i;
                  return -1;
              }

              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  super.onActivityResult(requestCode, resultCode, data);
                  if (requestCode == PICK_EXTENSION && resultCode == Activity.RESULT_OK && data != null) {
                      Uri uri = data.getData();
                      if (uri != null) installExtensionFromUri(uri);
                  }
              }

              private void installExtensionFromUri(Uri uri) {
                  GeckoRuntime rt = AppRuntime.runtime;
                  if (rt == null) return;
                  new Thread(() -> {
                      try {
                          String fileName = getFileName(uri);
                          if (fileName == null) fileName = "ext_" + System.currentTimeMillis();
                          String extName = fileName.replace(".zip", "").replace(".xpi", "");
                          File extDir = new File(getFilesDir(), "extensions/" + extName);
                          extDir.mkdirs();

                          InputStream is = getContentResolver().openInputStream(uri);
                          if (is == null) return;
                          ZipInputStream zip = new ZipInputStream(is);
                          ZipEntry entry;
                          while ((entry = zip.getNextEntry()) != null) {
                              File outFile = new File(extDir, entry.getName());
                              if (entry.isDirectory()) outFile.mkdirs();
                              else {
                                  if (outFile.getParentFile() != null) outFile.getParentFile().mkdirs();
                                  FileOutputStream fos = new FileOutputStream(outFile);
                                  byte[] buf = new byte[4096]; int len;
                                  while ((len = zip.read(buf)) != -1) fos.write(buf, 0, len);
                                  fos.close();
                              }
                              zip.closeEntry();
                          }
                          zip.close();

                          rt.getWebExtensionController()
                              .install("file://" + extDir.getAbsolutePath() + "/")
                              .accept(ext -> runOnUiThread(() -> {
                                  if (ext != null) { installedExtensions.add(ext); extAdapter.notifyItemInserted(installedExtensions.size() - 1); }
                                  Toast.makeText(this, "Extension installed!", Toast.LENGTH_SHORT).show();
                              }), err -> runOnUiThread(() ->
                                  Toast.makeText(this, "Install failed: " + (err != null ? err.getMessage() : "?"), Toast.LENGTH_LONG).show()
                              ));
                      } catch (Exception e) {
                          runOnUiThread(() -> Toast.makeText(this, "Error: " + e.getMessage(), Toast.LENGTH_LONG).show());
                      }
                  }).start();
              }

              private void showUrlInstallDialog() {
                  EditText input = new EditText(this);
                  input.setHint("https://addons.mozilla.org/...");
                  new AlertDialog.Builder(this)
                      .setTitle("Install from URL")
                      .setView(input)
                      .setPositiveButton("Install", (d, w) -> {
                          String url = input.getText().toString().trim();
                          if (url.isEmpty()) return;
                          GeckoRuntime rt = AppRuntime.runtime;
                          if (rt == null) return;
                          rt.getWebExtensionController().install(url)
                              .accept(ext -> runOnUiThread(() -> {
                                  if (ext != null) { installedExtensions.add(ext); extAdapter.notifyItemInserted(installedExtensions.size() - 1); }
                                  Toast.makeText(this, "Installed!", Toast.LENGTH_SHORT).show();
                              }), err -> runOnUiThread(() ->
                                  Toast.makeText(this, "Failed: " + (err != null ? err.getMessage() : "?"), Toast.LENGTH_LONG).show()
                              ));
                      })
                      .setNegativeButton("Cancel", null).show();
              }

              private String getFileName(Uri uri) {
                  try (Cursor cursor = getContentResolver().query(uri, null, null, null, null)) {
                      if (cursor != null && cursor.moveToFirst()) {
                          int idx = cursor.getColumnIndex(OpenableColumns.DISPLAY_NAME);
                          return idx >= 0 ? cursor.getString(idx) : null;
                      }
                  } catch (Exception ignored) {}
                  return null;
              }

              // ── RecyclerView adapter ────────────────────────────────────────
              private class ExtensionAdapter extends RecyclerView.Adapter<ExtensionAdapter.VH> {

                  class VH extends RecyclerView.ViewHolder {
                      TextView name, extId;
                      android.widget.Switch toggle;
                      ImageButton btnRemove;
                      VH(View v) {
                          super(v);
                          name = v.findViewById(R.id.ext_name);
                          extId = v.findViewById(R.id.ext_id);
                          toggle = v.findViewById(R.id.ext_toggle);
                          btnRemove = v.findViewById(R.id.ext_remove);
                      }
                  }

                  @Override
                  public VH onCreateViewHolder(ViewGroup parent, int viewType) {
                      View v = LayoutInflater.from(parent.getContext())
                          .inflate(R.layout.item_extension, parent, false);
                      return new VH(v);
                  }

                  @Override
                  public int getItemCount() { return installedExtensions.size(); }

                  @Override
                  public void onBindViewHolder(VH holder, int position) {
                      WebExtension ext = installedExtensions.get(position);
                      String displayName = (ext.metaData != null && ext.metaData.name != null)
                          ? ext.metaData.name : ext.id;
                      holder.name.setText(displayName);
                      holder.extId.setText(ext.id);
                      holder.toggle.setOnCheckedChangeListener(null);
                      holder.toggle.setChecked(ext.metaData == null || ext.metaData.enabled);
                      holder.toggle.setOnCheckedChangeListener((btn, checked) -> toggleExtension(ext, checked));
                      holder.btnRemove.setOnClickListener(v -> confirmUninstall(ext));
                  }
              }
          }
