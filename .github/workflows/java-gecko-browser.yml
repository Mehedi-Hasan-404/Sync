          echo '' | base64 -d > app/src/main/res/layout/home_page.xml

          echo '' | base64 -d > app/src/main/res/layout/home_chip.xml

          echo '' | base64 -d > app/src/main/res/drawable/home_search_bg.xml

          echo '' | base64 -d > app/src/main/res/drawable/ic_search.xml
