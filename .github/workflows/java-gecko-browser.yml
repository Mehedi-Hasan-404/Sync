          echo 'PD94bWwgdmVyc2lvbj0iMS4wIiBlbmNvZGluZz0idXRmLTgiPz4KPHNoYXBlIHhtbG5zOmFuZHJvaWQ9Imh0dHA6Ly9zY2hlbWFzLmFuZHJvaWQuY29tL2Fway9yZXMvYW5kcm9pZCIKICAgIGFuZHJvaWQ6c2hhcGU9InJlY3RhbmdsZSI+CiAgICA8Y29ybmVycyBhbmRyb2lkOnJhZGl1cz0iOGRwIi8+CiAgICA8c29saWQgYW5kcm9pZDpjb2xvcj0iIzI5MkEyRCIvPgo8L3NoYXBlPgo=' | base64 -d > app/src/main/res/drawable/popup_bg.xml

