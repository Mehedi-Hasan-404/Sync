CMAKELISTS

          # browser_native.cpp — JNI entry point, version info, UA helpers
          cat > app/src/main/cpp/browser_native.cpp << 'BROWSERNATIVE'
          #include <jni.h>
          #include <string>
          #include <sstream>
          #include <sys/utsname.h>
          #include <android/log.h>

          #define LOG_TAG "BrowserNative"
          #define LOGI(...) __android_log_print(ANDROID_LOG_INFO,  LOG_TAG, __VA_ARGS__)
          #define LOGE(...) __android_log_print(ANDROID_LOG_ERROR, LOG_TAG, __VA_ARGS__)

          extern "C" {

          // Returns the native ABI string this .so was compiled for
          JNIEXPORT jstring JNICALL
          Java_com_personal_javageckobrowser_NativeBridge_getAbi(JNIEnv *env, jclass) {
          #if defined(__aarch64__)
              return env->NewStringUTF("arm64-v8a");
          #elif defined(__arm__)
              return env->NewStringUTF("armeabi-v7a");
          #elif defined(__x86_64__)
              return env->NewStringUTF("x86_64");
          #elif defined(__i386__)
              return env->NewStringUTF("x86");
          #else
              return env->NewStringUTF("unknown");
          #endif
          }

          // Returns kernel version string — used to build a realistic UA
          JNIEXPORT jstring JNICALL
          Java_com_personal_javageckobrowser_NativeBridge_getKernelVersion(JNIEnv *env, jclass) {
              struct utsname buf;
              if (uname(&buf) == 0) {
                  std::string ver = std::string(buf.sysname) + "/" + buf.release;
                  return env->NewStringUTF(ver.c_str());
              }
              return env->NewStringUTF("Linux/unknown");
          }

          // Returns available RAM in MB via /proc/meminfo
          JNIEXPORT jlong JNICALL
          Java_com_personal_javageckobrowser_NativeBridge_getAvailableRamMb(JNIEnv *, jclass) {
              FILE *f = fopen("/proc/meminfo", "r");
              if (!f) return -1;
              long long kb = 0;
              char line[256];
              while (fgets(line, sizeof(line), f)) {
                  if (sscanf(line, "MemAvailable: %lld kB", &kb) == 1) break;
              }
              fclose(f);
              return (jlong)(kb / 1024);
          }

          } // extern "C"
BROWSERNATIVE

          # download_helper.cpp — native download chunk writer (faster than Java streams)
          cat > app/src/main/cpp/download_helper.cpp << 'DLHELPER'
          #include <jni.h>
          #include <string>
          #include <cstdio>
          #include <cstring>
          #include <android/log.h>

          #define LOG_TAG "DownloadHelper"
          #define LOGI(...) __android_log_print(ANDROID_LOG_INFO,  LOG_TAG, __VA_ARGS__)
          #define LOGE(...) __android_log_print(ANDROID_LOG_ERROR, LOG_TAG, __VA_ARGS__)

          extern "C" {

          // Write a byte buffer to a file path — avoids Java stream overhead for large chunks
          JNIEXPORT jint JNICALL
          Java_com_personal_javageckobrowser_NativeBridge_writeChunk(
                  JNIEnv *env, jclass,
                  jstring filePath, jbyteArray data, jint offset, jint length, jboolean append) {
              const char *path = env->GetStringUTFChars(filePath, nullptr);
              jbyte *buf = env->GetByteArrayElements(data, nullptr);

              FILE *f = fopen(path, append ? "ab" : "wb");
              int written = 0;
              if (f) {
                  written = (int)fwrite(buf + offset, 1, length, f);
                  fclose(f);
              } else {
                  LOGE("writeChunk: cannot open %s", path);
              }

              env->ReleaseByteArrayElements(data, buf, JNI_ABORT);
              env->ReleaseStringUTFChars(filePath, path);
              return written;
          }

          // Get file size without Java File overhead
          JNIEXPORT jlong JNICALL
          Java_com_personal_javageckobrowser_NativeBridge_getFileSize(
                  JNIEnv *env, jclass, jstring filePath) {
              const char *path = env->GetStringUTFChars(filePath, nullptr);
              FILE *f = fopen(path, "rb");
              long size = -1;
              if (f) {
                  fseek(f, 0, SEEK_END);
                  size = ftell(f);
                  fclose(f);
              }
              env->ReleaseStringUTFChars(filePath, path);
              return (jlong)size;
          }

          } // extern "C"
DLHELPER

          # crash_handler.cpp — installs SIGSEGV/SIGABRT handler, writes crash log to disk
          cat > app/src/main/cpp/crash_handler.cpp << 'CRASHHANDLER'
          #include <jni.h>
          #include <signal.h>
          #include <string>
          #include <cstdio>
          #include <ctime>
          #include <unistd.h>
          #include <android/log.h>

          #define LOG_TAG "CrashHandler"
          #define LOGE(...) __android_log_print(ANDROID_LOG_ERROR, LOG_TAG, __VA_ARGS__)

          static std::string g_crash_log_path;

          static void crash_signal_handler(int sig) {
              if (!g_crash_log_path.empty()) {
                  FILE *f = fopen(g_crash_log_path.c_str(), "a");
                  if (f) {
                      time_t t = time(nullptr);
                      char ts[64];
                      strftime(ts, sizeof(ts), "%Y-%m-%dT%H:%M:%S", gmtime(&t));
                      fprintf(f, "[%s] CRASH signal=%d pid=%d\n", ts, sig, getpid());
                      fclose(f);
                  }
              }
              LOGE("Crash signal %d received", sig);
              // Re-raise to get default core dump / system crash handling
              signal(sig, SIG_DFL);
              raise(sig);
          }

          extern "C" {

          JNIEXPORT void JNICALL
          Java_com_personal_javageckobrowser_NativeBridge_installCrashHandler(
                  JNIEnv *env, jclass, jstring logPath) {
              const char *path = env->GetStringUTFChars(logPath, nullptr);
              g_crash_log_path = path;
              env->ReleaseStringUTFChars(logPath, path);

              struct sigaction sa{};
              sa.sa_handler = crash_signal_handler;
              sigemptyset(&sa.sa_mask);
              sa.sa_flags = SA_RESETHAND;
              sigaction(SIGSEGV, &sa, nullptr);
              sigaction(SIGABRT, &sa, nullptr);
              sigaction(SIGBUS,  &sa, nullptr);
          }

          } // extern "C"
CRASHHANDLER

          # NativeBridge.java — JNI declarations + System.loadLibrary
          cat > app/src/main/java/com/personal/javageckobrowser/NativeBridge.java << 'NATIVEBRIDGE'
          package com.personal.javageckobrowser;

          public final class NativeBridge {

              static {
                  System.loadLibrary("browsernative");
              }

              private NativeBridge() {}

              /** Returns the ABI this binary was compiled for, e.g. "arm64-v8a" */
              public static native String getAbi();

              /** Returns kernel version string, e.g. "Linux/5.15.123-android14" */
              public static native String getKernelVersion();

              /** Returns available RAM in MB from /proc/meminfo */
              public static native long getAvailableRamMb();

              /**
               * Writes {@code length} bytes from {@code data[offset..]} to {@code filePath}.
               * If {@code append} is true, opens the file in append mode.
               * Returns the number of bytes written, or -1 on error.
               */
              public static native int writeChunk(String filePath, byte[] data,
                                                  int offset, int length, boolean append);

              /** Returns the size of the file at {@code filePath}, or -1 if not found. */
              public static native long getFileSize(String filePath);

              /**
               * Installs a native SIGSEGV/SIGABRT/SIGBUS handler that appends a
               * one-line crash entry to {@code logPath} before re-raising the signal.
               */
              public static native void installCrashHandler(String logPath);
          }
NATIVEBRIDGE

