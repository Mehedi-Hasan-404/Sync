          echo 'PD94bWwgdmVyc2lvbj0iMS4wIiBlbmNvZGluZz0idXRmLTgiPz4KPHJlc291cmNlcz4KICAgIDxzdHJpbmcgbmFtZT0iYXBwX25hbWUiPlBlcnNvbmFsIEJyb3dzZXIgSmF2YTwvc3RyaW5nPgo8L3Jlc291cmNlcz4K' | base64 -d > app/src/main/res/values/strings.xml

          mkdir -p app/src/main/cpp

          echo '' | base64 -d > app/src/main/cpp/CMakeLists.txt

          echo '' | base64 -d > app/src/main/cpp/browser_native.cpp

          echo '' | base64 -d > app/src/main/cpp/download_helper.cpp

          echo '' | base64 -d > app/src/main/cpp/crash_handler.cpp

          echo '' | base64 -d > app/src/main/java/com/personal/javageckobrowser/NativeBridge.java

          echo 'LWtlZXAgY2xhc3Mgb3JnLm1vemlsbGEuZ2Vja292aWV3LioqIHsgKjsgfQota2VlcCBjbGFzcyBjb20ucGVyc29uYWwuamF2YWdlY2tvYnJvd3Nlci5OYXRpdmVCcmlkZ2UgeyAqOyB9Ci1rZWVwY2xhc3Nlc3dpdGhtZW1iZXJuYW1lcyBjbGFzcyAqIHsgbmF0aXZlIDxtZXRob2RzPjsgfQo=' | base64 -d > app/proguard-rules.pro

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Generate Gradle wrapper
        working-directory: JavaGeckoBrowser
        run: |
          gradle wrapper --gradle-version=8.11.1
          chmod +x gradlew

      - name: Build Java Gecko Browser Debug APK
        working-directory: JavaGeckoBrowser
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload Java Gecko Browser APK
        uses: actions/upload-artifact@v4
        with:
          name: JavaGeckoBrowser-debug-apk
          path: JavaGeckoBrowser/app/build/outputs/apk/debug/
          retention-days: 30

      - name: Build Java Gecko Browser Release APK (unsigned)
        working-directory: JavaGeckoBrowser
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload Java Release APK
        uses: actions/upload-artifact@v4
        with:
          name: JavaGeckoBrowser-release-unsigned-apk
          path: JavaGeckoBrowser/app/build/outputs/apk/release/
          retention-days: 30
